  @keyframes slideUp { 0%{transform:translateY(40px);opacity:0} 100%{transform:translateY(0);opacity:1} }

const mkL = (id, title, sub, emoji, xp, letters, reviewLetters, vocabMC) => {
  // Flip randomisation happens at lesson-start in resolveLesson
  const ex = letters.map(c =>
    ({t:'MC', ml:c.ml, q:'How do you read this letter?', ans:c.rom, opts:c.opts, _flipLabel:c.rom, _flipOpts:c.flipOpts, _canFlip:true})
  );
  // TRACE for first 2 letters
  letters.slice(0, 2).forEach(c => ex.push({t:'TRACE', ml:c.ml, rom:c.rom}));
  // MATCH always has 4 pairs: first 2 new letters + up to 2 review letters
  // If review letters are missing, pad with more letters from this lesson
  const reviewSlice = (reviewLetters||[]).slice(0,2);
  const needed = 4 - reviewSlice.length;
  const matchLetters = [...letters.slice(0, needed), ...reviewSlice];
  ex.push({ t:'MATCH', pairs: matchLetters.map(c => ({ ml:c.ml, rom:c.rom })) });
  if (vocabMC) ex.push(vocabMC);
  return { id, title, sub, xp, emoji, ex };
};

// Inject vocab after each lesson's last MATCH exercise
for (const [idStr, exs] of Object.entries(VOCAB_ADDITIONS)) {
  const lesson = LESSONS.find(l => l.id === parseInt(idStr));
  if (!lesson) continue;
  let matchIdx = -1;
  for (let i = lesson.ex.length - 1; i >= 0; i--) {
    if (lesson.ex[i].t === 'MATCH') { matchIdx = i; break; }
  }
  if (matchIdx >= 0) lesson.ex.splice(matchIdx + 1, 0, ...exs);
  else lesson.ex.push(...exs);
}

  {id:1,  title:'Vowels',               sub:'13 vowel sounds',              icon:'🌊', color:'#0D5C39', lessonIds:[1,2,3],   desc:'Malayalam has 13 vowels — more than English. Each has a short and long form. Master these first and you\'ll be able to read a huge chunk of the script.'},

  {id:7,  title:'Chillu Letters',       sub:'Final consonant forms',         icon:'🔚', color:'#7C3AED', lessonIds:[21],     desc:'Chillus are special forms of consonants that appear at the end of syllables — like the ൻ in അവൻ (he) or the ൾ in അവൾ (she). They\'re extremely common in everyday Malayalam.'},

function saveProgress() {
  try {
    localStorage.setItem('ml_progress', JSON.stringify({
      xp: S.xp, hearts: S.hearts, done: [...S.done],
      streak: S.streak, lastDay: S.lastDay, stats: S.stats,
      onboarded: S.onboarded, mode: S.mode,
      dailyGoal: S.dailyGoal, reminderTime: S.reminderTime,
      lessonsTodayCount: S.lessonsTodayCount, srs: S.srs,
      badges: [...S.badges],
    }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem('ml_progress'));
    if (p) {
      S.xp                = p.xp                ?? 0;
      S.hearts            = p.hearts            ?? 5;
      S.done              = new Set(Array.isArray(p.done) ? p.done : []);
      S.streak            = p.streak            ?? 0;
      S.lastDay           = p.lastDay           ?? null;
      S.stats        = p.stats        ?? { lessonAcc:{}, wrongItems:{}, xpByDay:{}, wrongItemsRecent:{} };
      if (!S.stats.lessonAcc)        S.stats.lessonAcc        = {};
      if (!S.stats.wrongItems)       S.stats.wrongItems       = {};
      if (!S.stats.xpByDay)          S.stats.xpByDay          = {};
      if (!S.stats.wrongItemsRecent) S.stats.wrongItemsRecent = {};
      S.onboarded         = p.onboarded         ?? false;
      S.mode              = p.mode              ?? 'full';
      S.dailyGoal         = p.dailyGoal         ?? 1;
      S.reminderTime      = p.reminderTime      ?? null;
      S.lessonsTodayCount = p.lessonsTodayCount ?? 0;
      S.srs               = p.srs               ?? {};
      S.badges            = new Set(Array.isArray(p.badges) ? p.badges : []);
      if (!S.stats.timeByDay)        S.stats.timeByDay        = {};
      if (!S.stats.accByDay)         S.stats.accByDay         = {};
      if (!S.stats.bestAcc)          S.stats.bestAcc          = {};
    }
  } catch(e) {
    // Corrupt data — reset to defaults but don't crash
    console.warn('Could not load progress:', e);
  }
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (S.lastDay !== today) { S.hearts = 5; S.lessonsTodayCount = 0; }
  if (S.lastDay && S.lastDay !== today && S.lastDay !== yesterday) S.streak = 0;
}

function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const doSpeak = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ml-IN';
    utt.rate = 0.85;
    const voices = speechSynthesis.getVoices();
    const mlVoice = voices.find(v => v.lang.startsWith('ml'));
    if (mlVoice) utt.voice = mlVoice;
    speechSynthesis.speak(utt);
  };
  if (speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    let fired = false;
    speechSynthesis.onvoiceschanged = () => {
      if (fired) return; fired = true;
      speechSynthesis.onvoiceschanged = null; doSpeak();
    };
    setTimeout(() => { if (!fired) { fired = true; doSpeak(); } }, 500);
  }
}

// Detect Malayalam voice availability
let S_hasMLVoice = null;
function checkMLVoice() {
  if (S_hasMLVoice !== null) return;
  const voices = window.speechSynthesis?.getVoices() || [];
  if (voices.length > 0) {
    S_hasMLVoice = voices.some(v => v.lang.startsWith('ml'));
  }
}
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => { checkMLVoice(); speechSynthesis.onvoiceschanged = null; };
  setTimeout(checkMLVoice, 1000);
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'correct') {
      // Pleasant ascending chime — C major arpeggio
      [[523,0],[659,0.1],[784,0.2]].forEach(([freq,delay]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      });
    } else {
      // Soft low thud for wrong — gentle sine, low volume
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 220;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.10, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.35);
    }
  } catch(e) {}
}

// ─── EXERCISE VARIABILITY FUNCTIONS ─────────────────────────────────

function resolveEx(e) {
  // Swap example word from pool if available
  if ((e.t==='INTRO' || e.t==='MATRA') && CHAR_EGS[e.ml || e.result]) {
    const pool = CHAR_EGS[e.ml || e.result];
    const eg = pool[Math.floor(Math.random() * pool.length)];
    return {...e, eg};
  }
  return e;
}

function resolveLesson(lesson, isReplay) {
  let exs = lesson.ex.map(e => {
    // Randomly flip letter MCs between letter→rom and rom→letter
    if (e.t === 'MC' && e._canFlip && e._flipOpts) {
      if (Math.random() < 0.5) {
        return {t:'MC', flip:true, flabel:e._flipLabel, ml:e.ml,
          q:`Which letter makes the '${e._flipLabel}' sound?`,
          ans:e.ml, opts:e._flipOpts};
      }
    }
    return resolveEx(e);
  });

  // Gate vocab MCs: only show if at least one character of the word has been taught
  // (in a completed lesson OR this lesson itself)
  const taughtLetters = new Set();
  for (const lid of S.done) { const ls = LESSON_TAUGHT[lid]; if (ls) ls.forEach(c => taughtLetters.add(c)); }
  const ownLetters = LESSON_TAUGHT[lesson.id];
  if (ownLetters) ownLetters.forEach(c => taughtLetters.add(c));
  exs = exs.filter(e => {
    if (e.t !== 'MC' || e._canFlip || e.flip) return true; // keep letter MCs + non-MCs
    return [...e.ml].some(ch => taughtLetters.has(ch));
  });

  // On replay: shuffle exercise groups (keep INTRO→MC pairs together, MATCH/FREE at end)
  if (isReplay) {
    const groups = [], terminals = [];
    let i = 0;
    while (i < exs.length) {
      const e = exs[i];
      if (['INTRO','MATRA','VOCAB','SENT'].includes(e.t)) {
        const group = [e];
        let j = i + 1;
        while (j < exs.length && exs[j].t === 'MC') { group.push(exs[j]); j++; }
        groups.push(group); i = j;
      } else if (e.t === 'MATCH' || e.t === 'FREE') {
        terminals.push(e); i++;
      } else { groups.push([e]); i++; }
    }
    exs = [...groups.sort(()=>Math.random()-0.5).flat(), ...terminals];
  }

  // Replace FREE questions from pool if available
  const pool = LESSON_FREE_POOLS[lesson.id];
  if (pool && pool.length > 0) {
    const pick = pool[Math.floor(Math.random() * pool.length)];
    exs = exs.map(e => e.t === 'FREE' ? {...e, ...pick} : e);
  }

  return exs;
}

// ── SPACED REPETITION ───────────────────────────────────────────────
// SM-2 inspired: interval doubles on correct, resets on wrong
// ease factor adjusts difficulty per item

const SRS_INITIAL_EASE = 2.5;
const MS_PER_DAY = 86400000;

function srsItemsFromLessons() {
  // Build a map of all reviewable items from completed lessons
  const items = new Map();
  for (const l of LESSONS) {
    if (!S.done.has(l.id)) continue;
    for (const e of l.ex) {
      if (e._canFlip && e.ml && !items.has(e.ml))
        items.set(e.ml, {ml:e.ml, rom:e._flipLabel, type:'letter'});
      if (e.t==='MATCH') e.pairs.forEach(p => {
        if (!items.has(p.ml)) items.set(p.ml, {ml:p.ml, rom:p.rom, type:'letter'});
      });
      if (e.t==='MC' && !e._canFlip && e.ml && e.ans && !items.has(e.ml))
        items.set(e.ml, {ml:e.ml, rom:ML_ROM[e.ml]||'', eng:e.ans, type:'vocab'});
    }
  }
  return [...items.values()];
}

function srsSeedException(ml, rom, eng, type) {
  // Add a new item to SRS with due = now (review immediately)
  if (S.srs[ml]) return;
  S.srs[ml] = {interval:1, ease:SRS_INITIAL_EASE, due:Date.now(), reps:0, rom, eng, type};
}

function srsSeedLesson(lessonId) {
  // Seed all items from a lesson into SRS when lesson is completed
  const l = LESSONS.find(l => l.id === lessonId);
  if (!l) return;
  for (const e of l.ex) {
    if (e._canFlip && e.ml) srsSeedException(e.ml, e._flipLabel, '', 'letter');
    if (e.t==='MATCH') e.pairs.forEach(p => srsSeedException(p.ml, p.rom, '', 'letter'));
    if (e.t==='MC' && !e._canFlip && e.ml && e.ans) srsSeedException(e.ml, ML_ROM[e.ml]||'', e.ans, 'vocab');
  }
}

function srsUpdate(ml, correct) {
  const item = S.srs[ml];
  if (!item) return;
  const now = Date.now();
  if (correct) {
    item.reps++;
    item.ease = Math.max(1.3, item.ease + 0.1);
    item.interval = item.reps === 1 ? 1 : item.reps === 2 ? 3 : Math.round(item.interval * item.ease);
  } else {
    item.reps = 0;
    item.ease = Math.max(1.3, item.ease - 0.2);
    item.interval = 1;
  }
  item.due = now + item.interval * MS_PER_DAY;
}

function srsDueCount() {
  const now = Date.now();
  return Object.values(S.srs).filter(i => i.due <= now).length;
}

function buildPracticeQueue() {
  const now = Date.now();
  const allItems = srsItemsFromLessons();
  if (allItems.length === 0) return [];

  // Seed any items not yet in SRS
  for (const item of allItems) srsSeedException(item.ml, item.rom, item.eng||'', item.type);

  // Due items first, then soonest-due as fallback to always have something
  const due     = allItems.filter(i => S.srs[i.ml]?.due <= now);
  const notDue  = allItems.filter(i => S.srs[i.ml]?.due > now)
                          .sort((a,b) => S.srs[a.ml].due - S.srs[b.ml].due);
  const pool    = [...due, ...notDue].slice(0, 15);

  return pool.map(item => makePracticeEx(item, allItems)).filter(Boolean);
}

function makePracticeEx(item, allItems) {
  const shuffle = a => [...a].sort(()=>Math.random()-0.5);
  const others = allItems.filter(i => i.ml !== item.ml);
  if (item.type === 'letter') {
    const wrongRoms = shuffle(others.filter(i=>i.rom && i.rom!==item.rom)).slice(0,3).map(i=>i.rom);
    if (wrongRoms.length < 3) return null;
    return {t:'MC', ml:item.ml, q:`What sound does ${item.ml} make?`, ans:item.rom, opts:shuffle([item.rom,...wrongRoms]), isPractice:true};
  }
  if (item.type === 'vocab') {
    const eng = item.eng || S.srs[item.ml]?.eng || '';
    if (!eng) return null;
    const vocabOthers = others.filter(i => (i.eng || S.srs[i.ml]?.eng) && (i.eng || S.srs[i.ml]?.eng) !== eng);
    if (vocabOthers.length >= 3) {
      const wrongEngs = shuffle(vocabOthers).slice(0,3).map(i => i.eng || S.srs[i.ml]?.eng);
      return {t:'MC', ml:item.ml, q:`What does ${item.ml} mean?`, ans:eng, opts:shuffle([eng,...wrongEngs]), isPractice:true};
    }
  }
  return null;
}

function startPractice() {
  const queue = buildPracticeQueue();
  if (queue.length === 0) return;
  S = {...S, screen:'practice-session', practiceQueue:queue, practiceEi:0, practiceScore:0, lxp:0, fb:null, ft:'', mcPicked:null, retryQueue:[]};
  render();
}

function nextPracticeEx() {
  const newIdx = S.practiceEi + 1;
  if (newIdx >= S.practiceQueue.length) {
    // Append retry items before finishing
    if (S.retryQueue.length > 0) {
      S = {...S, practiceQueue:[...S.practiceQueue, ...S.retryQueue], retryQueue:[], practiceEi:newIdx, fb:null, ft:'', mcPicked:null};
      render(); return;
    }
    // Practice complete — restore +3 hearts + XP
    const newHearts = Math.min(5, S.hearts + 3);
    const bonusXp   = S.practiceScore * 3;
    const today     = new Date().toDateString();
    const newXpByDay = {...S.stats.xpByDay, [today]: (S.stats.xpByDay[today]||0) + S.lxp + bonusXp};
    S = {...S, screen:'practice-results', hearts:newHearts,
      xp:S.xp+S.lxp+bonusXp, fb:null, ft:'', mcPicked:null,
      stats:{...S.stats, xpByDay:newXpByDay}};
    saveProgress(); render();
    setTimeout(launchConfetti, 100);
  } else {
    S = {...S, practiceEi:newIdx, fb:null, ft:'', mcPicked:null};
    render();
  }
}

function recordStat(correct) {
  const e = getEx();
  const lid = S.screen === 'practice-session' ? null : S.lid;
  const today = new Date().toDateString();
  if (lid) {
    if (!S.stats.lessonAcc[lid]) S.stats.lessonAcc[lid] = { correct:0, total:0 };
    S.stats.lessonAcc[lid].total++;
    if (correct) S.stats.lessonAcc[lid].correct++;
  }
  // Track daily accuracy
  if (!S.stats.accByDay) S.stats.accByDay = {};
  if (!S.stats.accByDay[today]) S.stats.accByDay[today] = { correct:0, total:0 };
  S.stats.accByDay[today].total++;
  if (correct) S.stats.accByDay[today].correct++;

  if (!correct && e) {
    const label = e.ml || e.result || (e.q||'').slice(0,30);
    S.stats.wrongItems[label] = (S.stats.wrongItems[label] || 0) + 1;
    S.stats.wrongItemsRecent[label] = Date.now();
  }
}

function good(pts=5, msg='Correct! 🎉') {
  playSound('correct'); recordStat(true);
  const inP = S.screen === 'practice-session';
  if (inP) { S.practiceScore++; pts = 3; srsUpdate(getEx()?.ml, true); }
  const newRetry = S.retryQueue.filter(r => r._qid !== getEx()?._qid);
  S = {...S, lxp:S.lxp+pts, fb:{ok:true,msg}, retryQueue:newRetry};
  render();
}
function bad(msg) {
  playSound('wrong'); recordStat(false);
  const inP = S.screen === 'practice-session';
  if (inP) srsUpdate(getEx()?.ml, false);
  const isRetry = getEx()?._retry === true;
  const heartSafe = inP || S.isReplay || isRetry;
  const newHearts = heartSafe ? S.hearts : Math.max(0, S.hearts - 1);
  const noHeartsMsg = !heartSafe && newHearts === 0 ? ' No hearts left — finish this lesson, then practice to continue ❤️' : '';
  // Add current exercise to retry queue (avoid duplicates), mark as retry
  const e = getEx();
  const alreadyQueued = S.retryQueue.some(r => r._qid === e?._qid);
  const retryEx = e && !alreadyQueued ? {...e, _retry:true} : null;
  const newRetry = retryEx ? [...S.retryQueue, retryEx] : S.retryQueue;
  S = {...S, hearts:newHearts, fb:{ok:false, msg: msg + noHeartsMsg}, retryQueue:newRetry};
  if (!inP) saveProgress();
  render();
}

function handleMC(opt, ans) {
  if (S.fb) return;
  // Only play audio in flip mode (options are Malayalam letters)
  const e = getEx();
  if (e && e.flip) speak(opt);
  S.mcPicked = opt;
  render();
}

function submitMC(opt, ans) {
  if (S.fb || !opt) return;
  opt === ans ? good() : bad(`The answer is "${ans}"`);
}

async function handleFree() {
  const e = getEx();
  if (S.grading || !S.ft.trim()) return;
  const inp = S.ft.trim().toLowerCase().replace(/[.,!?]/g,'').trim();
  const ans = e.ans.toLowerCase();
  const alts = (e.alts || []).map(a => a.toLowerCase());
  if (ans.split(' / ').some(v=>inp===v) || inp===ans || alts.includes(inp)) { good(8); return; }
  S.grading = true; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,
        messages:[{role:'user',content:`Language learning. Q:"${e.q}" Correct:"${e.ans}". Student:"${S.ft.trim()}". Acceptable? JSON only: {"ok":true} or {"ok":false}`}]})
    });
    const d = await res.json();
    const r = JSON.parse((d.content?.[0]?.text||'{"ok":false}').replace(/```json|```/g,'').trim());
    r.ok ? good(8) : bad(`The answer is "${e.ans}"`);
  } catch { bad(`The answer is "${e.ans}"`); }
  S.grading = false; render();
}

function loseHeartSilent() {
  if (S.screen === 'practice-session' || S.isReplay || getEx()?._retry) return;
  playSound('wrong');
  recordStat(false);
  const newHearts = Math.max(0, S.hearts - 1);
  const e = getEx();
  const alreadyQueued = S.retryQueue.some(r => r._qid === e?._qid);
  const newRetry = e && !alreadyQueued ? [...S.retryQueue, {...e, _retry:true}] : S.retryQueue;
  S = {...S, hearts: newHearts, retryQueue: newRetry};
  saveProgress();
}

function handleMatch(side, val) {
  const e = getEx();
  if (!e?.pairs || S.fb || S.mDone.includes(val) || S.mWrong) return;
  if (!S.mSel) { S.mSel={side,val}; render(); return; }
  if (S.mSel.side===side) { S.mSel={side,val}; render(); return; }
  const lv = side==='L'?val:S.mSel.val, rv = side==='R'?val:S.mSel.val;
  const hit = e.pairs.find(p=>p.ml===lv&&p.rom===rv);
  if (hit) {
    const nd=[...S.mDone,lv,rv]; S.mDone=nd; S.mSel=null; render();
    if (nd.length>=e.pairs.length*2) setTimeout(()=>good(10,'All matched! 🎉'),200);
  } else {
    if (!S.mHeartLost) { loseHeartSilent(); S.mHeartLost = true; }
    S.mWrong=[S.mSel.val,val]; render();
    setTimeout(()=>{ S.mWrong=null; S.mSel=null; render(); },700);
  }
}

function render() {
  const savedFt = document.getElementById('free-input')?.value ?? S.ft;
  document.getElementById('root').innerHTML = buildApp();
  S.ft = savedFt;
  const reminderInp = document.getElementById('reminder-edit');
  if (reminderInp) {
    reminderInp.addEventListener('change', e => {
      S.reminderTime = e.target.value || null;
      saveProgress();
      render();
    });
  }
  const inp = document.getElementById('free-input');
  if (inp) {
    inp.value = S.ft;
    inp.addEventListener('input', e => S.ft = e.target.value);
    inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!S.fb) handleFree(); });
    if (!S.fb) setTimeout(()=>inp.focus(),50);
  }
}

function buildApp() {
  if (!S.onboarded)                  return buildOnboarding();
  if (S.screen==='home')             return buildHome();
  if (S.screen==='results')          return buildResults();
  if (S.screen==='stats')            return buildStats();
  if (S.screen==='practice')         return buildPractice();
  if (S.screen==='practice-session') return buildPracticeSession();
  if (S.screen==='practice-results') return buildPracticeResults();
  if (S.screen==='learn')            return buildLearn();
  return buildLesson();
}

        <div style="text-align:center;padding:16px 0 8px;border-top:1px solid #E7E5E4;margin-top:8px">

          <div style="font-size:11px;color:#A8A29E;font-weight:700;margin-top:2px">santhoshtr/mlmash · MIT License</div>
        </div>`}
      </div>
    </div>
    ${buildNav('home')}`;
}

// ─── RESULTS ────────────────────────────────────────────────────────
function buildResults() {
  const lesson = getLesson();
  const wasReplay = S.isReplay;
  const lid = S.lid;
  const acc = S.stats.lessonAcc[lid];

  // Personal best — only on replay
  const prevBest = S.stats.bestAcc?.[lid];
  const currentPct = acc && acc.total > 0 ? Math.round(acc.correct/acc.total*100) : null;
  const isPersonalBest = wasReplay && currentPct !== null && prevBest !== null && prevBest !== undefined && currentPct > prevBest;
  const personalBestHTML = isPersonalBest
    ? `<div class="anim-up" style="background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.4);border-radius:14px;padding:10px 20px;margin-top:14px;animation-delay:0.2s">
        <div style="font-size:14px;font-weight:900;color:#F5A623">🎯 Personal Best! ${currentPct}% vs previous ${prevBest}%</div>
       </div>` : '';

  // New badges earned this lesson
  const newBadgeIds = S.newBadges || [];
  const newBadgesHTML = newBadgeIds.length > 0
    ? `<div class="anim-up" style="margin-top:14px;animation-delay:0.25s">
        ${newBadgeIds.map(id => {
          const b = BADGE_DEFS.find(x => x.id === id);
          return b ? `<div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:10px 18px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
            <div style="font-size:28px">${b.icon}</div>
            <div>
              <div style="font-size:11px;font-weight:900;color:rgba(255,255,255,0.5);letter-spacing:1px">BADGE UNLOCKED</div>
              <div style="font-size:15px;font-weight:900;color:#F5A623">${b.name}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:700">${b.desc}</div>
            </div>
          </div>` : '';
        }).join('')}
       </div>` : '';

  return `
    <div style="min-height:100vh;background:linear-gradient(135deg,#0D5C39,#093d27);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center">
      <div class="anim-pop"  style="font-size:78px">🎊</div>
      <div class="anim-up"   style="font-size:30px;font-weight:900;color:white;margin-top:8px;animation-delay:0.1s">Lesson Complete!</div>
      <div class="anim-up"   style="font-size:14px;color:rgba(255,255,255,0.6);margin-top:6px;font-weight:700;animation-delay:0.15s">${S.streak >= 7 ? '🔥 ' + S.streak + ' day streak — incredible!' : S.streak >= 3 ? '🔥 ' + S.streak + ' days in a row!' : "You're making great progress! 🌴"}</div>
      <div class="anim-xp"   style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.14);border-radius:24px;padding:22px 52px;margin-top:30px">
        <div style="font-size:54px;font-weight:900;color:#F5A623;line-height:1">+${S.lxp}</div>
        <div style="font-size:11px;font-weight:900;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:1.5px">XP EARNED</div>
      </div>
      ${personalBestHTML}
      ${newBadgesHTML}
      <div class="anim-up" style="display:flex;gap:14px;margin-top:18px;animation-delay:0.35s">
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="font-size:22px;font-weight:900;color:#fb923c">🔥${S.streak}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">DAY STREAK</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="display:flex;gap:2px;justify-content:center">${heartsHTML()}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">HEARTS</div>
          <div style="font-size:8px;font-weight:700;color:rgba(255,255,255,0.35);margin-top:2px">refills daily</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="font-size:20px;font-weight:900;color:#F5A623">⚡${S.xp}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">TOTAL XP</div>
        </div>
      </div>
      <button data-action="go-home" class="anim-up" style="margin-top:34px;background:#F5A623;color:#093d27;border:none;border-radius:16px;padding:15px 54px;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:0.5px;animation-delay:0.45s">CONTINUE →</button>
    </div>`;
}

// ─── LESSON ─────────────────────────────────────────────────────────
function buildLesson() {
  const l = getLesson(), e = getEx();
  if (!l||!e) return '';
  const prog = S.resolvedEx.length > 0 ? S.ei / S.resolvedEx.length : 0;

  let exHTML = '';
  if (e.t==='INTRO') exHTML = buildIntro(e);
  if (e.t==='MC')    exHTML = buildMC(e);
  if (e.t==='MATCH') exHTML = buildMatch(e);
  else if (e.t==='TRACE') exHTML = buildTRACE(e);
  if (e.t==='FREE')  exHTML = buildFree(e);
  if (e.t==='VOCAB' || e.t==='SENT')  exHTML = buildVocab(e);
  if (e.t==='MATRA') exHTML = buildMatra(e);
  if (e.t==='FITB')  exHTML = buildFITB(e);
  if (e.t==='BUILD') exHTML = buildBUILDEx(e);

  const fbHTML = S.fb ? `
    <div style="position:sticky;bottom:0;background:${S.fb.ok?'#059669':'#DC2626'};padding:18px 22px;border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.14)">
      <div>
        <div style="font-size:17px;font-weight:900;color:white">${S.fb.msg}</div>
        ${!S.fb.ok?'<div style="font-size:13px;color:rgba(255,255,255,0.78);margin-top:3px;font-weight:700">Every mistake is a lesson 💪</div>':''}
      </div>
      <button data-action="next-ex" style="background:white;border:none;border-radius:14px;padding:12px 24px;font-size:14px;font-weight:900;cursor:pointer;color:${S.fb.ok?'#059669':'#DC2626'};white-space:nowrap;flex-shrink:0">CONTINUE →</button>
    </div>` : '';

  return `
    <div style="min-height:100vh;background:#F7F2EB;display:flex;flex-direction:column">
      <div style="background:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #E7E5E4;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,0.06)">
        <button data-action="go-home" style="background:none;border:none;font-size:18px;cursor:pointer;color:#78716C;padding:4px 6px;line-height:1">✕</button>
        <div style="flex:1;height:12px;background:#E7E5E4;border-radius:999px;overflow:hidden">
          <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#0D5C39,#1a8a56);width:${prog*100}%;transition:width 0.4s ease"></div>
        </div>
        <div style="display:flex;gap:2px">${heartsHTML()}</div>
      </div>
      ${S.hearts===0 && !S.isReplay ? `<div style="background:#FEE2E2;border-bottom:1px solid #FECACA;padding:8px 16px;display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">💔</span>
        <span style="font-size:12px;font-weight:800;color:#DC2626;flex:1">No hearts — finish this lesson, then practice to continue</span>
        <button data-action="nav-practice" style="background:#DC2626;color:white;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:900;cursor:pointer">Practice →</button>
      </div>` : ''}
      <div style="flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:22px 18px 16px">
        ${exHTML}
      </div>
      ${fbHTML}
    </div>
    ${buildTooltipOverlay()}`;
}

function buildIntro(e) {
  const parts  = e.eg.split('·');
  const mlWord = parts[0].trim();
  const rest   = parts.slice(1).join('·').trim();
  const isLF   = S.mode === 'language-first';
  const label  = isLF ? 'NEW WORD' : 'NEW LETTER';
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:10px;font-weight:900;color:#0D5C39;letter-spacing:2px">${label}</div>
        <div style="font-size:10px;color:#78716C;font-weight:700">🤖 computer voice</div>
      </div>
      <div style="background:#fff;border-radius:24px;padding:32px 28px 24px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
        ${isLF
          ? `<div style="font-size:32px;font-weight:900;color:#F5A623;letter-spacing:1px">${e.rom}</div>
             <div class="ml" style="font-size:22px;color:#A8A29E;line-height:1.2">${e.ml}</div>`
          : `<div class="ml" style="font-size:${mlSize(e.ml)}px;font-weight:700;color:#0D5C39;line-height:1.15">${e.ml}</div>`
        }
        <button data-action="speak" data-text="${esc(e.ml)}" style="background:#FEF3C7;border:2px solid #F5A623;border-radius:50px;padding:8px 22px;font-size:15px;font-weight:900;cursor:pointer;color:#d4891e;display:flex;align-items:center;gap:8px">
          🔈 <span style="letter-spacing:1px">${e.rom}</span>
        </button>
        <div style="background:#FEF3C7;border-radius:12px;padding:9px 20px;font-size:13px;font-weight:800;color:#92400E;max-width:300px">${e.hint}</div>
        <button data-action="speak" data-text="${esc(mlWord)}" style="background:none;border:1px solid #E7E5E4;border-radius:10px;padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%">
          <span class="ml" style="font-size:15px;color:#1C1917">${mlWord}</span>
          <span style="font-size:12px;color:#78716C;font-weight:700"> · ${rest}</span>
          <span style="color:#F5A623;flex-shrink:0">🔈</span>
        </button>
      </div>
      <button data-action="next-ex" style="margin-top:16px;background:#0D5C39;color:white;border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;width:100%">GOT IT →</button>
    </div>`;
}

function buildMC(e) {
  let optsHTML = '';
  for (const opt of e.opts) {
    let bg='#fff', bdr='2px solid #E7E5E4', col='#1C1917';
    if (S.fb&&opt===e.ans)           {bg='#D1FAE5';bdr='2px solid #059669';col='#059669';}
    else if (S.mcPicked===opt&&!S.fb){bg='#FEF3C7';bdr='2px solid #F5A623';col='#d4891e';}
    const ff = e.flip ? "'Noto Serif Malayalam',serif" : "'Nunito',sans-serif";
    const fs = e.flip ? 24 : 15;
    optsHTML += `<button data-action="mc-pick" data-opt="${esc(opt)}" data-ans="${esc(e.ans)}" style="background:${bg};border:${bdr};border-radius:14px;padding:15px 10px;font-size:${fs}px;font-weight:800;cursor:${S.fb?'default':'pointer'};color:${col};font-family:${ff};box-shadow:0 2px 14px rgba(0,0,0,0.10)">${opt}</button>`;
  }

  // For vocab MCs (not letter MCs), show romanization inline under the word
  const isVocabMC = !e.flip && !e._canFlip;
  const inlineRom = isVocabMC && S.mode === 'language-first' ? (e.rom || ML_ROM[e.ml] || '') : '';
  // For letter MCs, data-eng = '' (answer IS the rom — avoid showing it twice in tooltip)
  // For vocab MCs, data-eng = English meaning
  const tooltipEng = e._canFlip ? '' : e.ans;
  // Simplify question label for vocab MCs (word is already shown)
  const qLabel = isVocabMC ? 'What does this mean?' : e.q;

  const display = !e.flip
    ? `<div style="display:flex;flex-direction:column;align-items:center;gap:10px">
         <div class="ml" data-action="show-tooltip" data-ml="${esc(e.ml)}" data-eng="${esc(tooltipEng)}" data-rom="${esc(e._flipLabel||ML_ROM[e.ml]||'')}" style="font-size:${mlSize(e.ml||'')}px;font-weight:700;color:#0D5C39;cursor:pointer;border-bottom:2px dashed rgba(13,92,57,0.25);padding-bottom:2px" title="Tap to peek">${e.ml}</div>
         ${inlineRom ? `<div style="font-size:15px;color:#78716C;font-weight:700;letter-spacing:0.5px">${inlineRom}</div>` : ''}
         <button data-action="speak" data-text="${esc(e.ml)}" style="background:#FEF3C7;border:2px solid #F5A623;border-radius:50px;padding:5px 16px;font-size:13px;font-weight:900;cursor:pointer;color:#d4891e;display:inline-flex;align-items:center;gap:5px">🔈 hear it</button>
         <div style="font-size:10px;color:#A8A29E;font-weight:700">${isVocabMC ? 'tap for meaning' : 'tap to peek'}</div>
       </div>`
    : `<div style="font-size:34px;font-weight:900;color:#0D5C39">"${e.flabel}"</div>`;
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:15px;font-weight:800;color:#1C1917;margin-bottom:16px">${qLabel}</div>
      <div style="background:#fff;border-radius:22px;padding:26px 22px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);margin-bottom:18px">
        ${display}
        <div style="font-size:12px;color:#78716C;margin-top:10px;font-weight:800">${e.flip?'→ Tap each letter to hear it':'→ Tap the correct answer'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${optsHTML}</div>
      ${!S.fb ? `<button data-action="mc-check" data-opt="${esc(S.mcPicked||'')}" data-ans="${esc(e.ans)}"
        style="background:${S.mcPicked?'#0D5C39':'#E7E5E4'};color:${S.mcPicked?'white':'#A8A29E'};border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:900;cursor:${S.mcPicked?'pointer':'default'};letter-spacing:0.5px">
        CHECK ✓</button>` : ''}
    </div>`;
}

function buildMatch(e) {
  const rs = S.shuffled.length===e.pairs.length ? S.shuffled : e.pairs;
  let lHTML='', rHTML='';
  for (const p of e.pairs) {
    const done=S.mDone.includes(p.ml),sel=S.mSel?.side==='L'&&S.mSel.val===p.ml,wrg=S.mWrong?.includes(p.ml);
    lHTML+=`<button data-action="match-l" data-val="${esc(p.ml)}" data-speak="${esc(p.ml)}" style="flex:1;background:${done?'#D1FAE5':wrg?'#FEE2E2':sel?'#FEF3C7':'#fff'};border:2px solid ${done?'#059669':wrg?'#DC2626':sel?'#F5A623':'#E7E5E4'};border-radius:14px;padding:8px 6px;font-family:'Noto Serif Malayalam',serif;font-size:${mlSize(p.ml)}px;font-weight:700;color:${done?'#059669':wrg?'#DC2626':sel?'#d4891e':'#1C1917'};cursor:${done?'default':'pointer'};opacity:${done?0.5:1};line-height:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:58px">
      ${p.ml}
    </button>`;
  }
  for (const p of rs) {
    const display = p.eng || p.rom;
    const done=S.mDone.includes(p.rom),sel=S.mSel?.side==='R'&&S.mSel.val===p.rom,wrg=S.mWrong?.includes(p.rom);
    rHTML+=`<button data-action="match-r" data-val="${esc(p.rom)}" style="flex:1;background:${done?'#D1FAE5':wrg?'#FEE2E2':sel?'#FEF3C7':'#fff'};border:2px solid ${done?'#059669':wrg?'#DC2626':sel?'#F5A623':'#E7E5E4'};border-radius:14px;padding:8px 6px;font-size:14px;font-weight:900;color:${done?'#059669':wrg?'#DC2626':sel?'#d4891e':'#1C1917'};cursor:${done?'default':'pointer'};opacity:${done?0.5:1};min-height:58px">${esc(display)}</button>`;
  }
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:15px;font-weight:800;color:#1C1917;margin-bottom:4px">Match the pairs</div>
      <div style="font-size:13px;color:#78716C;font-weight:700;margin-bottom:16px">Tap a word, then tap its match</div>
      <div style="display:flex;gap:10px;flex:1">
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">${lHTML}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">${rHTML}</div>
      </div>
    </div>`;
}

function buildFree(e) {
  const iBdr = S.fb?(S.fb.ok?'#059669':'#DC2626'):'#E7E5E4';
  const iBg  = S.fb?(S.fb.ok?'#D1FAE5':'#FEE2E2'):'#fff';
  const bBg  = S.ft.trim()&&!S.grading?'#0D5C39':'#E7E5E4';
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:10px;font-weight:900;color:#7C3AED;letter-spacing:2px;margin-bottom:14px">FREE RESPONSE</div>
      <div style="background:#fff;border-radius:20px;padding:24px 22px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);margin-bottom:18px">
        <div style="font-size:17px;font-weight:800;color:#1C1917;line-height:1.45">${e.q}</div>
        <div style="font-size:13px;color:#78716C;margin-top:12px;font-weight:700">Hint: ${e.hint}</div>
      </div>
      <input id="free-input" type="text" placeholder="Type your answer…" ${S.fb||S.grading?'disabled':''}
        style="border:2px solid ${iBdr};border-radius:14px;padding:15px 16px;font-size:16px;font-weight:800;background:${iBg};color:#1C1917;outline:none;margin-bottom:13px;width:100%"/>
      ${!S.fb?`<button data-action="check-free" style="background:${bBg};color:white;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:900;cursor:${S.ft.trim()&&!S.grading?'pointer':'default'};width:100%">${S.grading?'Checking ✨':'CHECK'}</button>`:''}
    </div>`;
}

function buildVocab(e) {
  const isSent = e.t === 'SENT';
  // SENT: word chips are tappable for tooltip
  const wordsHTML = isSent && e.words
    ? e.words.map(w => `
        <button data-action="show-tooltip" data-ml="${esc(w.ml)}" data-eng="${esc(w.eng)}"
          style="background:#F7F2EB;border-radius:8px;padding:6px 12px;text-align:center;cursor:pointer;border:1px solid transparent">
          <div class="ml" style="font-size:15px;color:#0D5C39;font-weight:700">${w.ml}</div>
          <div style="font-size:10px;color:#78716C;font-weight:700;margin-top:1px">${w.eng} 👆</div>
        </button>`).join('')
    : '';
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:10px;font-weight:900;color:#0D5C39;letter-spacing:2px;margin-bottom:16px">${isSent ? 'SIMPLE SENTENCE' : 'VOCABULARY'}</div>
      <div style="background:#fff;border-radius:24px;padding:28px 24px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
        <div class="ml" style="font-size:${mlSize(e.ml)}px;font-weight:700;color:#0D5C39;line-height:1.3">${e.ml}</div>
        <button data-action="speak" data-text="${esc(e.ml)}" style="background:#FEF3C7;border:2px solid #F5A623;border-radius:50px;padding:7px 20px;font-size:14px;font-weight:900;cursor:pointer;color:#d4891e;display:inline-flex;align-items:center;gap:7px">
          🔈 <span>${e.rom}</span>
        </button>
        <div style="font-size:17px;font-weight:900;color:#1C1917">${e.eng}</div>
        ${isSent && e.words ? `
          <div style="font-size:11px;color:#78716C;font-weight:700">Tap any word to see its meaning 👆</div>
          <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:4px">${wordsHTML}</div>` : ''}
        ${!isSent && e.note ? `<div style="background:#F0FDF4;border-radius:12px;padding:9px 16px;font-size:12px;font-weight:800;color:#065F46;max-width:290px">${e.note}</div>` : ''}
      </div>
      <button data-action="next-ex" style="margin-top:16px;background:#0D5C39;color:white;border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;width:100%">GOT IT →</button>
    </div>`;
}

// ─── FILL IN THE BLANK ───────────────────────────────────────────────
function buildFITB(e) {
  const partsHTML = (e.parts||[]).map(p => {
    if (p.isBlank) {
      const filled = S.mcPicked && S.fb;
      return `<span style="display:inline-block;min-width:80px;background:${S.fb?(S.fb.ok?'#D1FAE5':'#FEE2E2'):'#FEF3C7'};border-radius:8px;padding:5px 12px;font-family:'Noto Serif Malayalam',serif;font-size:20px;color:${S.fb?(S.fb.ok?'#059669':'#DC2626'):'#d4891e'};font-weight:700;text-align:center;border:2px solid ${S.fb?(S.fb.ok?'#059669':'#DC2626'):'#F5A623'}">${filled?S.mcPicked:'___'}</span>`;
    }

// ─── TRACE EXERCISE ──────────────────────────────────────────────────
function buildTRACE(e) {
  const letter = e.ml;
  const stroke = ML_STROKES[letter];
  if (!stroke) return `<div>No stroke data for ${letter}</div>`;
  const romLabel = ML_ROM[letter] || e.rom || '';

  // Always restore canvas and set up touch handlers after render
  setTimeout(() => {
    const c = document.getElementById('trace-canvas');
    if (!c) return;
    const ctx2 = c.getContext('2d');

    // Restore any previous drawing
    if (S.traceImageData) {
      const img = new Image();
      img.onload = () => ctx2.drawImage(img, 0, 0);
      img.src = S.traceImageData;
    }

    // Set up drawing handlers
    let drawing = false;
    let lastPos = null;
    function pos(ev) { const r=c.getBoundingClientRect(),s=ev.touches?ev.touches[0]:ev; return {x:s.clientX-r.left,y:s.clientY-r.top}; }
    function dot(p) {
      if (lastPos) {
        ctx2.beginPath();
        ctx2.moveTo(lastPos.x, lastPos.y);
        ctx2.lineTo(p.x, p.y);
        ctx2.strokeStyle = '#0D5C39cc';
        ctx2.lineWidth = 10;
        ctx2.lineCap = 'round';
        ctx2.lineJoin = 'round';
        ctx2.stroke();
      }
      lastPos = p;
    }
    c.addEventListener('touchstart', e=>{e.preventDefault();drawing=true;lastPos=pos(e);},{passive:false});
    c.addEventListener('touchmove',  e=>{e.preventDefault();if(drawing)dot(pos(e));},{passive:false});
    c.addEventListener('touchend',   e=>{e.preventDefault();drawing=false;lastPos=null;});
    c.addEventListener('mousedown',  e=>{drawing=true;lastPos=pos(e);});
    c.addEventListener('mousemove',  e=>{if(drawing)dot(pos(e));});
    c.addEventListener('mouseup',    ()=>{drawing=false;lastPos=null;});
  }, 50);

  // Size canvas to match letter aspect ratio — tall letters get more height
  const [vx, vy, vw, vh] = stroke.vb.split(' ').map(Number);
  const pad = Math.max(vw, vh) * 0.10;
  const paddedVB = `${vx-pad} ${vy-pad} ${vw+pad*2} ${vh+pad*2}`;
  const pvw = vw + pad*2, pvh = vh + pad*2;
  const canvasW = 220;
  const canvasH = Math.round(Math.min(300, Math.max(220, canvasW * pvh / pvw)));

  // Only run animation on first load
  if (!S.traceComplete && !S.fb) setTimeout(() => initTrace(stroke, paddedVB), 50);

  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:10px;font-weight:900;color:#0E7490;letter-spacing:2px;margin-bottom:14px">TRACE THE LETTER</div>
      <div style="background:#fff;border-radius:22px;padding:16px;box-shadow:0 2px 14px rgba(0,0,0,0.10);display:flex;flex-direction:column;align-items:center;gap:10px">
        <div style="font-size:13px;font-weight:700;color:#78716C">Watch the stroke, then trace it</div>
        <div style="position:relative;width:${canvasW}px;height:${canvasH}px;border-radius:16px;background:#F7F2EB;border:2px solid #E7E5E4;overflow:hidden">
          <canvas id="trace-canvas" width="${canvasW}" height="${canvasH}" style="position:absolute;top:0;left:0;touch-action:none"></canvas>
          <svg id="trace-guide" viewBox="${paddedVB}" preserveAspectRatio="xMidYMid meet" width="${canvasW}" height="${canvasH}" style="position:absolute;top:0;left:0;pointer-events:none">
            ${stroke.p.map(d => `<path d="${d}" stroke="#0E749033" stroke-width="40" stroke-linecap="round" fill="none"/>`).join('')}
          </svg>
        </div>
        ${romLabel ? `<div style="font-size:16px;font-weight:900;color:#78716C;letter-spacing:1px">${romLabel}</div>` : ''}
        <div style="display:flex;gap:10px">
          <button data-action="trace-replay" style="background:#F0F9FF;border:2px solid #BAE6FD;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:900;cursor:pointer;color:#0284C7">▶ Watch again</button>
          ${S.traceComplete ? `<button data-action="next-ex" style="background:#0D5C39;color:white;border:none;border-radius:10px;padding:8px 20px;font-size:13px;font-weight:900;cursor:pointer">NEXT →</button>` : ''}
        </div>
      </div>
      <div style="font-size:11px;color:#A8A29E;font-weight:700;text-align:center;margin-top:10px">Trace with your finger in the grey box above</div>
    </div>`;
}

// ─── STATS ──────────────────────────────────────────────────────────
function buildStats() {
  const acc = S.stats.lessonAcc;
  const totalCorrect = Object.values(acc).reduce((s,v)=>s+v.correct,0);
  const totalAttempts = Object.values(acc).reduce((s,v)=>s+v.total,0);
  const overallPct = totalAttempts > 0 ? Math.round(totalCorrect/totalAttempts*100) : 0;

  // Letters learned — count from LESSON_TAUGHT for completed lessons
  const lettersLearned = new Set();
  for (const lid of S.done) {
    const ls = LESSON_TAUGHT[lid];
    if (ls) ls.forEach(c => { if (ML_STROKES[c]) lettersLearned.add(c); });
  }
  const totalLetters = Object.keys(ML_STROKES).length; // 53

  // Study time — real tracked seconds
  const timeByDay = S.stats.timeByDay || {};
  const now = Date.now();
  const todayKey = new Date().toDateString();
  const secsToLabel = s => s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m` : `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;

  const todaySecs   = timeByDay[todayKey] || 0;
  const weeklySecs  = Object.entries(timeByDay)
    .filter(([k]) => now - new Date(k).getTime() < 7*86400000)
    .reduce((s,[,v]) => s+v, 0);
  const monthlySecs = Object.entries(timeByDay)
    .filter(([k]) => now - new Date(k).getTime() < 30*86400000)
    .reduce((s,[,v]) => s+v, 0);
  const totalSecs   = Object.values(timeByDay).reduce((s,v) => s+v, 0);

  // Daily accuracy chart with month selector
  const accByDay = S.stats.accByDay || {};
  const allDates = Object.keys(accByDay).sort();

  // Get available months
  const monthSet = new Set(allDates.map(d => {
    const dt = new Date(d); return `${dt.getFullYear()}-${dt.getMonth()}`;
  }));
  const now2 = new Date();
  const currentMonthKey = `${now2.getFullYear()}-${now2.getMonth()}`;
  if (!S.statsMonth || !monthSet.has(S.statsMonth)) S.statsMonth = currentMonthKey;
  const [selYear, selMonth] = S.statsMonth.split('-').map(Number);

  // Days in selected month
  const daysInMonth = new Date(selYear, selMonth+1, 0).getDate();
  const monthDays = Array.from({length: daysInMonth}, (_, i) => {
    const d = new Date(selYear, selMonth, i+1);
    return d.toDateString();
  });

  const dayData = monthDays.map(key => ({
    key,
    day: new Date(key).getDate(),
    acc: accByDay[key] || null,
    pct: accByDay[key] ? Math.round(accByDay[key].correct / accByDay[key].total * 100) : null
  }));

  const hasData = dayData.some(d => d.acc);
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthTabs = [...monthSet].sort().map(mk => {
    const [y, m] = mk.split('-').map(Number);
    const sel = mk === S.statsMonth;
    return `<button data-action="stats-month" data-month="${mk}" style="background:${sel?'#0D5C39':'#F7F2EB'};color:${sel?'white':'#78716C'};border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:900;cursor:pointer">${monthNames[m]} ${y !== now2.getFullYear() ? y : ''}</button>`;
  }).join('');

  const accChart = !hasData
    ? `<div style="text-align:center;color:#A8A29E;font-size:13px;font-weight:700;padding:16px">No data for this month yet</div>`
    : (() => {
        const maxH = 60;
        const bars = dayData.map(d => {
          const h = d.pct !== null ? Math.max(4, Math.round(d.pct/100*maxH)) : 0;
          const col = d.pct === null ? '#E7E5E4' : d.pct >= 80 ? '#059669' : d.pct >= 60 ? '#D97706' : '#DC2626';
          const isToday = d.key === new Date().toDateString();
          return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:2px">
            <div style="font-size:8px;font-weight:800;color:${d.pct!==null?col:'transparent'}">${d.pct!==null?d.pct+'%':''}</div>
            <div style="width:100%;height:${maxH}px;display:flex;align-items:flex-end">
              <div style="width:100%;height:${h}px;background:${col};border-radius:3px 3px 0 0;${isToday?'outline:2px solid #F5A623':''}"></div>
            </div>
            <div style="font-size:8px;font-weight:800;color:${isToday?'#0D5C39':'#A8A29E'}">${d.day}</div>
          </div>`;
        }).join('');
        return `<div style="display:flex;align-items:flex-end;gap:1px">${bars}</div>`;
      })();

  // Weekly XP chart — last 7 days
  const days = Array.from({length:7}).map((_,i) => {
    const d = new Date(Date.now() - (6-i)*86400000);
    return { label: d.toLocaleDateString('en',{weekday:'short'}), key: d.toDateString() };
  });
  const maxXp = Math.max(1, ...days.map(d => S.stats.xpByDay[d.key]||0));
  const chartBars = days.map(d => {
    const xp = S.stats.xpByDay[d.key] || 0;
    const h = Math.max(4, Math.round((xp/maxXp)*80));
    const isToday = d.key === new Date().toDateString();
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:10px;font-weight:800;color:${xp>0?'#0D5C39':'#A8A29E'}">${xp||''}</div>
      <div style="width:100%;background:${isToday?'#0D5C39':xp>0?'#6EE7B7':'#E7E5E4'};border-radius:6px 6px 0 0;height:${h}px;min-height:4px;transition:height 0.3s"></div>
      <div style="font-size:10px;font-weight:800;color:${isToday?'#0D5C39':'#A8A29E'}">${d.label}</div>
    </div>`;
  }).join('');

  // Needs work — top 5 wrong items
  const sorted = Object.entries(S.stats.wrongItems).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const wrongHTML = sorted.length === 0
    ? `<div style="text-align:center;color:#A8A29E;font-size:13px;font-weight:700;padding:16px">No mistakes yet — amazing! 🌟</div>`
    : sorted.map(([label, count]) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F7F2EB">
          <span class="ml" style="font-size:22px;color:#1C1917">${label}</span>
          <span style="background:#FEE2E2;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:900;color:#DC2626">${count} miss${count>1?'es':''}</span>
        </div>`).join('');

  return `
    <div style="min-height:100vh;background:#F7F2EB;padding-bottom:80px">
      <div style="background:linear-gradient(135deg,#0D5C39,#093d27);padding:28px 20px 24px;color:white">
        <div style="max-width:520px;margin:0 auto">
          <div style="font-size:22px;font-weight:900">Your Stats 📊</div>

function buildLearnScript() {
  const card = (ml, rom, color, covered) => `
    <button data-action="speak" data-text="${esc(ml)}"
      style="background:#fff;border:1px solid #E7E5E4;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;flex:1;min-width:54px;opacity:${covered?1:0.38}">
      <div class="ml" style="font-size:26px;color:${color};line-height:1.1">${ml}</div>
      <div style="font-size:9px;font-weight:800;color:#78716C;margin-top:3px">${rom}</div>
    </button>`;

  const section = (title, icon, color, content, covered) => `
    <div style="margin-bottom:24px;opacity:${covered?1:0.55}">
      <div style="background:${color};border-radius:14px;padding:10px 16px;color:white;display:flex;align-items:center;gap:8px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12)">
        <span style="font-size:18px">${icon}</span>
        <span style="font-size:14px;font-weight:900">${title}</span>
        ${covered?'':'<span style="margin-left:auto;font-size:11px;opacity:0.7">Not yet covered</span>'}
      </div>
      ${content}
    </div>`;

  const row = cards => `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px">${cards}</div>`;

  const vc = sectionDone(SCRIPT_COVERAGE.vowels);
  const cc = sectionDone(SCRIPT_COVERAGE.consonants);
  const mc = sectionDone(SCRIPT_COVERAGE.matras);
  const lc = sectionDone(SCRIPT_COVERAGE.chillu);
  const nc = sectionDone(SCRIPT_COVERAGE.numbers);

  const vowelsHTML = row([
    ['അ','a'],['ആ','aa'],['ഇ','i'],['ഈ','ii'],['ഉ','u'],['ഊ','uu'],
    ['എ','e'],['ഏ','ee'],['ഐ','ai'],['ഒ','o'],['ഓ','oo'],['ഔ','au'],
  ].map(([ml,rom])=>card(ml,rom,'#0D5C39',vc)).join(''));

  const cGroups = [
    {label:'Velar',     color:'#1D4ED8', letters:[['ക','ka'],['ഖ','kha'],['ഗ','ga'],['ഘ','gha'],['ങ','nga']]},
    {label:'Palatal',   color:'#1D4ED8', letters:[['ച','cha'],['ഛ','chha'],['ജ','ja'],['ഝ','jha'],['ഞ','nya']]},
    {label:'Retroflex', color:'#9A3412', letters:[['ട','tt'],['ഠ','tth'],['ഡ','dd'],['ഢ','ddh'],['ണ','nn']]},
    {label:'Dental',    color:'#9A3412', letters:[['ത','tha'],['ഥ','thha'],['ദ','dha'],['ധ','dhha'],['ന','na']]},
    {label:'Labial',    color:'#065F46', letters:[['പ','pa'],['ഫ','pha'],['ബ','ba'],['ഭ','bha'],['മ','ma']]},
    {label:'Semivowel', color:'#065F46', letters:[['യ','ya'],['ര','ra'],['ല','la'],['വ','va']]},
    {label:'Sibilant',  color:'#4C1D95', letters:[['ശ','sha'],['ഷ','shha'],['സ','sa'],['ഹ','ha']]},
    {label:'Special',   color:'#4C1D95', letters:[['ള','ll'],['ഴ','zh'],['റ','rra']]},
  ];
  const consHTML = cGroups.map(g => `
    <div style="margin-bottom:10px">
      <div style="font-size:9px;font-weight:900;color:#A8A29E;letter-spacing:1.5px;margin-bottom:5px">${g.label.toUpperCase()}</div>
      ${row(g.letters.map(([ml,rom])=>card(ml,rom,g.color,cc)).join(''))}
    </div>`).join('');

  const matrasHTML = `
    <div style="font-size:11px;color:#78716C;font-weight:700;margin-bottom:8px">Using ക (ka) as base — tap to hear 🔈</div>
    ${row([['കാ','kaa'],['കി','ki'],['കീ','kii'],['കു','ku'],['കൂ','kuu'],
           ['കെ','ke'],['കേ','kee'],['കൈ','kai'],['കൊ','ko'],['കോ','koo'],['ക്','k·']
    ].map(([ml,rom])=>card(ml,rom,'#0E7490',mc)).join(''))}`;

  const chilluHTML = `
    <div style="font-size:11px;color:#78716C;font-weight:700;margin-bottom:8px">Final consonant forms</div>
    ${row([['ൻ','n'],['ർ','r'],['ൽ','l'],['ൾ','ll'],['ൺ','nn']
    ].map(([ml,rom])=>card(ml,rom,'#4C1D95',lc)).join(''))}`;

  const numsHTML = row([
    ['ഒന്ന്','1'],['രണ്ട്','2'],['മൂന്ന്','3'],['നാല്','4'],['അഞ്ച്','5'],
    ['ആറ്','6'],['ഏഴ്','7'],['എട്ട്','8'],['ഒമ്പത്','9'],['പത്ത്','10'],['ഇരുപത്','20'],
  ].map(([ml,rom])=>card(ml,rom,'#B45309',nc)).join(''));

  return `
    ${section('Vowels · സ്വരങ്ങൾ',       '🌊', '#0D5C39', vowelsHTML,  vc)}
    ${section('Consonants · വ്യഞ്ജനങ്ങൾ', '🔤', '#1D4ED8', consHTML,   cc)}
    ${section('Matras · Vowel Signs',      '✍️', '#0E7490', matrasHTML, mc)}
    ${section('Chillu Letters',            '⭐', '#4C1D95', chilluHTML, lc)}
    ${section('Numbers · സംഖ്യകൾ',        '🔢', '#B45309', numsHTML,   nc)}`;
}

function buildPractice() {
  const totalDone = S.done.size;
  const due = srsDueCount();
  const itemCount = buildPracticeQueue().length;
  const canPractice = totalDone > 0 && itemCount > 0;
  const needsWork = Object.entries(S.stats.wrongItems)
    .filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);

  const topItems = needsWork.slice(0,5).map(([ml,count])=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F7F2EB">
      <span class="ml" style="font-size:22px;color:#1C1917;min-width:80px">${ml}</span>
      <div style="flex:1;height:6px;background:#E7E5E4;border-radius:99px;overflow:hidden">
        <div style="height:100%;background:#DC2626;border-radius:99px;width:${Math.min(100,count*20)}%"></div>
      </div>
      <span style="font-size:12px;font-weight:900;color:#DC2626">${count} miss${count>1?'es':''}</span>
    </div>`).join('');

  return `
    <div style="min-height:100vh;background:#F7F2EB;padding-bottom:80px">
      <div style="background:linear-gradient(135deg,#0D5C39,#093d27);padding:28px 20px 24px;color:white">
        <div style="max-width:520px;margin:0 auto">
          <div style="font-size:22px;font-weight:900">Practice 🎯</div>
          <div style="font-size:13px;opacity:0.65;font-weight:700;margin-top:3px">Spaced repetition — items come back at the right time</div>

    <div style="min-height:100vh;background:#F7F2EB;display:flex;flex-direction:column">
      <div style="background:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #E7E5E4;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,0.06)">
        <button data-action="nav-practice" style="background:none;border:none;font-size:18px;cursor:pointer;color:#78716C;padding:4px 6px;line-height:1">✕</button>
        <div style="flex:1;height:12px;background:#E7E5E4;border-radius:999px;overflow:hidden">
          <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#F5A623,#fb923c);width:${prog*100}%;transition:width 0.4s ease"></div>
        </div>
        <div style="font-size:12px;font-weight:900;color:#78716C">${S.practiceEi+1}/${S.practiceQueue.length}</div>
      </div>
      <div style="background:#FEF3C7;padding:6px 14px;text-align:center;border-bottom:1px solid #FDE68A">
        <span style="font-size:11px;font-weight:900;color:#92400E">🎯 PRACTICE SESSION · No hearts lost · Earn ❤️ on completion</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:22px 18px 16px">
        ${exHTML}
      </div>
      ${fbHTML}
    </div>
    ${buildTooltipOverlay()}`;
}

      <div class="anim-up" style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:6px;font-weight:700;animation-delay:0.1s">${pct>=80?'Excellent work! 🌟':pct>=60?'Good effort! Keep it up 💪':'Keep practicing — you\'ll get there! 🌴'}</div>

      <div class="anim-up" style="background:rgba(255,255,255,0.2);border-radius:16px;padding:14px 28px;margin-top:16px;border:1px solid rgba(255,255,255,0.25);animation-delay:0.3s">
        <div style="font-size:22px;font-weight:900;color:white">${heartsHTML()} ${S.hearts}/5</div>

      <button data-action="nav-practice" class="anim-up" style="margin-top:28px;background:white;color:#d4891e;border:none;border-radius:16px;padding:15px 48px;font-size:16px;font-weight:900;cursor:pointer;animation-delay:0.4s">DONE ✓</button>

// ═══════════════════════════════════════════════════════════════════
// TRACE ENGINE
// ═══════════════════════════════════════════════════════════════════

function initTrace(strokeData, viewBox) {
  const canvas = document.getElementById('trace-canvas');
  const guide  = document.getElementById('trace-guide');
  if (!canvas || !guide || !strokeData?.p?.length) return;
  if (viewBox) guide.setAttribute('viewBox', viewBox);

  const ctx = canvas.getContext('2d');
  const W = 220, H = 220;
  const strokes = strokeData.p;
  let animId = null;

  // Animate stroke reveal
  function animateStroke(si, onDone) {
    if (si >= strokes.length) { if (onDone) onDone(); return; }
    const pts = strokes[si];
    let i = 0;
    // Draw guide path in SVG — viewBox handles scaling automatically
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const d = strokeData.p[si];
    path.setAttribute('d', d);
    path.setAttribute('stroke', '#0E749088');
    path.setAttribute('stroke-width', '40');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    const len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    guide.appendChild(path);
    const dur = Math.max(600, len * 0.8);
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / dur);
      path.style.strokeDashoffset = len * (1 - t);
      if (t < 1) { animId = requestAnimationFrame(step); }
      else { setTimeout(() => animateStroke(si + 1, onDone), 300); }
    }
    animId = requestAnimationFrame(step);
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, W, H);
    guide.innerHTML = '';
  }

  function playAnimation(onDone) {
    clearCanvas();
    animateStroke(0, () => {
      S.traceComplete = true;
      render();
      if (onDone) onDone();
    });
  }

  // Handle replay button
  window._traceReplay = () => { if(animId) cancelAnimationFrame(animId); playAnimation(); };

  // Start with animation
  playAnimation();
}

// ═══════════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action==='go-home')      { S = {...S, screen:'home', tooltip:null, expandedBadge:null, fb:null}; render(); }
  else if (action==='nav-home')     { S = {...S, screen:'home', tooltip:null, expandedBadge:null, fb:null}; render(); }
  else if (action==='nav-practice') { S.screen='practice';  render(); }
  else if (action==='nav-learn')    { S.screen='learn';     render(); }
  else if (action==='nav-stats')    { S.screen='stats';     render(); }
  else if (action==='learn-tab')    { S.learnTab=el.dataset.val; render(); }
  else if (action==='ob-mode') {
    S.mode = el.dataset.val;
    S.onboardStep = 1;
    render();
  }
  else if (action==='ob-goal') {
    S.dailyGoal = parseInt(el.dataset.val);
    render();
  }
  else if (action==='ob-clear-reminder') {
    S.reminderTime = null;
    render();
  }
  else if (action==='ob-back') {
    S.onboardStep = 0;
    render();
  }
  else if (action==='ob-finish') {
    const timeInput = document.getElementById('reminder-input');
    if (timeInput) S.reminderTime = timeInput.value || null;
    S.onboarded = true;
    S.screen = 'home';
    saveProgress();
    render();
  }
  else if (action==='toggle-unit') {
    const uid = parseInt(el.dataset.uid);
    S.expandedUnit = S.expandedUnit === uid ? null : uid;
    render();
  }
  else if (action==='set-goal') {
    S.dailyGoal = parseInt(el.dataset.val);
    saveProgress();
    render();
  }
  else if (action==='xp-refill-hearts') {
    if (S.xp >= 100) {
      S = {...S, xp: S.xp - 100, hearts: 5};
      saveProgress(); render();
    }
  }
  else if (action==='stats-month') {
    S = {...S, statsMonth: el.dataset.month};
    render();
  }
  else if (action==='expand-badge') {
    S.expandedBadge = S.expandedBadge === el.dataset.bid ? null : el.dataset.bid;
    render();
  }
  else if (action==='toggle-mode') {
    S.mode = S.mode === 'full' ? 'language-first' : 'full';
    saveProgress();
    render();
  }
  // ── END TOGGLE-MODE ──
  else if (action==='trace-replay') { if(window._traceReplay) window._traceReplay(); }
  else if (action==='next-ex') { nextEx(); }
  else if (action==='start-practice') { startPractice(); }
  else if (action==='start-lesson') { startLesson(parseInt(el.dataset.id)); }
  else if (action==='check-free')   { handleFree(); }
  else if (action==='speak')  { e.stopPropagation(); speak(el.dataset.text); }
  else if (action==='mc-pick'){ handleMC(el.dataset.opt, el.dataset.ans); }
  else if (action==='mc-check'){ submitMC(el.dataset.opt, el.dataset.ans); }
  else if (action==='match-l'){ if(el.dataset.speak) speak(el.dataset.speak); handleMatch('L', el.dataset.val); }
  else if (action==='match-r'){ handleMatch('R', el.dataset.val); }
  // Tooltip
  else if (action==='show-tooltip') {
    e.stopPropagation();
    const ttRom = el.dataset.rom || ML_ROM[el.dataset.ml] || '';
    S.tooltip = {ml: el.dataset.ml, eng: el.dataset.eng, rom: ttRom};
    render();
  }
  else if (action==='dismiss-tooltip') { S.tooltip = null; render(); }
  // Build (drag-and-drop)
  else if (action==='build-place') {
    const idx = parseInt(el.dataset.idx);
    const tile = S.buildAvailable[idx];
    if (!tile) return;
    S.buildAvailable = S.buildAvailable.filter((_,i)=>i!==idx);
    S.buildPlaced = [...S.buildPlaced, tile];
    render();
  }
  else if (action==='build-remove') {
    const idx = parseInt(el.dataset.idx);
    const tile = S.buildPlaced[idx];
    if (!tile) return;
    S.buildPlaced = S.buildPlaced.filter((_,i)=>i!==idx);
    S.buildAvailable = [...S.buildAvailable, tile];
    render();
  }
  else if (action==='build-check') {
    try {
      const correct = JSON.parse(el.dataset.correct);
      const placed  = S.buildPlaced.map(t=>t.ml);
      const isOk    = correct.length === placed.length && correct.every((w,i)=>w===placed[i]);
      isOk ? good(10, 'Perfect sentence! 🎉') : bad(`Not quite — try: ${correct.join(' ')}`);
    } catch {}
  }
});
