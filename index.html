<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Serif+Malayalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #F7F2EB; font-family: 'Nunito', sans-serif; color: #1C1917; min-height: 100vh; }
  button { font-family: 'Nunito', sans-serif; }
  button:active { opacity: 0.85; }
  input { font-family: 'Nunito', sans-serif; }
  .ml { font-family: 'Noto Serif Malayalam', serif; }
  @keyframes popIn   { 0%{transform:scale(0.4);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  @keyframes slideUp { 0%{transform:translateY(40px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  @keyframes xpPop   { 0%{transform:scale(0.5) rotate(-8deg);opacity:0} 70%{transform:scale(1.2) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
  @keyframes confetti {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity:1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }
  .anim-pop    { animation: popIn   0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .anim-up     { animation: slideUp 0.4s ease both; }
  .anim-xp     { animation: xpPop  0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }
  .confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation: confetti linear forwards; pointer-events:none; z-index:999; }
</style>

const mkL = (id, title, sub, emoji, xp, letters, free) => {
  const ex = letters.flatMap(c => [
    { t:'INTRO', ml:c.ml, rom:c.rom, hint:c.hint, eg:c.eg },
    { t:'MC', ml:c.ml, q:'What sound does this letter make?', ans:c.rom, opts:c.opts },
  ]);
  ex.push({ t:'MATCH', pairs: letters.slice(0,4).map(c => ({ ml:c.ml, rom:c.rom })) });
  if (free) ex.push(free);
  return { id, title, sub, xp, emoji, ex };
};

const LESSONS = [

for (const [idStr, exs] of Object.entries(VOCAB_ADDITIONS)) {
  const lesson = LESSONS.find(l => l.id === parseInt(idStr));
  if (!lesson) continue;
  let matchIdx = -1;
  for (let i = lesson.ex.length - 1; i >= 0; i--) {
    if (lesson.ex[i].t === 'MATCH') { matchIdx = i; break; }
  }
  if (matchIdx >= 0) lesson.ex.splice(matchIdx + 1, 0, ...exs);
  else lesson.ex.push(...exs);
}

function saveProgress() {
  try {
    localStorage.setItem('ml_progress', JSON.stringify({
      xp: S.xp, hearts: S.hearts, done: [...S.done],
      streak: S.streak, lastDay: S.lastDay, stats: S.stats,
      onboarded: S.onboarded, mode: S.mode,
      dailyGoal: S.dailyGoal, reminderTime: S.reminderTime,
      lessonsTodayCount: S.lessonsTodayCount,
    }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem('ml_progress'));
    if (p) {
      S.xp                = p.xp                ?? 0;
      S.hearts            = p.hearts            ?? 5;
      S.done              = new Set(Array.isArray(p.done) ? p.done : []);
      S.streak            = p.streak            ?? 0;
      S.lastDay           = p.lastDay           ?? null;
      S.stats             = p.stats             ?? { lessonAcc:{}, wrongItems:{}, xpByDay:{} };
      if (!S.stats.lessonAcc)  S.stats.lessonAcc  = {};
      if (!S.stats.wrongItems) S.stats.wrongItems = {};
      if (!S.stats.xpByDay)    S.stats.xpByDay    = {};
      S.onboarded         = p.onboarded         ?? false;
      S.mode              = p.mode              ?? 'full';
      S.dailyGoal         = p.dailyGoal         ?? 1;
      S.reminderTime      = p.reminderTime      ?? null;
      S.lessonsTodayCount = p.lessonsTodayCount ?? 0;
    }
  } catch(e) {
    // Corrupt data — reset to defaults but don't crash
    console.warn('Could not load progress:', e);
  }
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (S.lastDay !== today) { S.hearts = 5; S.lessonsTodayCount = 0; }
  if (S.lastDay && S.lastDay !== today && S.lastDay !== yesterday) S.streak = 0;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const doSpeak = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ml-IN';
    utt.rate = 0.85;
    const voices = speechSynthesis.getVoices();
    const mlVoice = voices.find(v => v.lang.startsWith('ml'));
    if (mlVoice) utt.voice = mlVoice;
    speechSynthesis.speak(utt);
  };
  if (speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; doSpeak(); };
  }
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'correct') {
      // Pleasant ascending chime — C major arpeggio
      [[523,0],[659,0.1],[784,0.2]].forEach(([freq,delay]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.35);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      });
    } else {
      // Low dull thud for wrong
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 160;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.28);
    }
  } catch(e) {}
}

function launchConfetti() {
  const colors = ['#F5A623','#0D5C39','#059669','#3B82F6','#EC4899','#F97316'];
  for (let i = 0; i < 36; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-12px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (6 + Math.random() * 10) + 'px';
    el.style.height = (6 + Math.random() * 10) + 'px';
    el.style.animationDuration = (1.8 + Math.random() * 2) + 's';
    el.style.animationDelay   = (Math.random() * 0.6) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ─── EXERCISE VARIABILITY FUNCTIONS ─────────────────────────────────

function resolveEx(e) {
  // Swap example word from pool if available
  if ((e.t==='INTRO' || e.t==='MATRA') && CHAR_EGS[e.ml || e.result]) {
    const pool = CHAR_EGS[e.ml || e.result];
    const eg = pool[Math.floor(Math.random() * pool.length)];
    return {...e, eg};
  }
  return e;
}

function resolveLesson(lesson, isReplay) {
  let exs = lesson.ex.map(resolveEx);

  // On replay: shuffle exercise groups (keep INTRO→MC pairs together, MATCH/FREE at end)
  if (isReplay) {
    const groups = [], terminals = [];
    let i = 0;
    while (i < exs.length) {
      const e = exs[i];
      if (['INTRO','MATRA','VOCAB','SENT'].includes(e.t)) {
        const group = [e];
        let j = i + 1;
        while (j < exs.length && exs[j].t === 'MC') { group.push(exs[j]); j++; }
        groups.push(group); i = j;
      } else if (e.t === 'MATCH' || e.t === 'FREE') {
        terminals.push(e); i++;
      } else { groups.push([e]); i++; }
    }
    exs = [...groups.sort(()=>Math.random()-0.5).flat(), ...terminals];
  }

  // Replace FREE questions from pool if available
  const pool = LESSON_FREE_POOLS[lesson.id];
  if (pool && pool.length > 0) {
    const pick = pool[Math.floor(Math.random() * pool.length)];
    exs = exs.map(e => e.t === 'FREE' ? {...e, ...pick} : e);
  }

  return exs;
}

function startLesson(id) {

  render();
  if (firstEx?.t==='INTRO' || firstEx?.t==='MATRA') setTimeout(()=>speak(firstEx.ml || firstEx.result), 400);
}

function nextEx() {
  if (S.screen === 'practice-session') { nextPracticeEx(); return; }
  const newEi = S.ei + 1;
  if (newEi >= S.resolvedEx.length) {

      fb:null, ft:'', mcPicked:null, mSel:null, mDone:[], mWrong:null,

      shuffled: nextE?.t==='MATCH' ? [...nextE.pairs].sort(()=>Math.random()-0.5) : S.shuffled};

// ── PRACTICE / SPACED REPETITION ────────────────────────────────────

function buildPracticeQueue() {
  const itemMap = new Map();
  for (const lesson of LESSONS) {
    if (!S.done.has(lesson.id)) continue;
    for (const ex of lesson.ex) {
      if (ex.t==='INTRO' && ex.ml)   itemMap.set(ex.ml, {ml:ex.ml, rom:ex.rom, hint:ex.hint, eg:ex.eg, type:'letter'});
      if (ex.t==='MATRA' && ex.result) itemMap.set(ex.result, {ml:ex.result, rom:ex.rom, hint:ex.hint, eg:ex.eg, type:'matra'});
      if (ex.t==='VOCAB' && ex.ml)   itemMap.set(ex.ml, {ml:ex.ml, rom:ex.rom, eng:ex.eng, type:'vocab'});
    }
  }
  const items = [...itemMap.values()];
  if (items.length === 0) return [];

  // Weight by error frequency — more errors = more likely to appear
  const weighted = items.map(item => ({ item, weight: 1 + (S.stats.wrongItems[item.ml]||0) * 3 }));
  const total = weighted.reduce((s,w) => s+w.weight, 0);

  const selected = new Set();
  const queue = [];
  const target = Math.min(8, items.length);
  let tries = 0;
  while (queue.length < target && tries < 200) {
    tries++;
    let r = Math.random() * total;
    for (const {item, weight} of weighted) {
      r -= weight;
      if (r <= 0 && !selected.has(item.ml)) {
        selected.add(item.ml);
        const ex = makePracticeEx(item, items);
        if (ex) queue.push(ex);
        break;
      }
    }
  }
  return queue;
}

function makePracticeEx(item, allItems) {
  const shuffle = a => [...a].sort(()=>Math.random()-0.5);
  const others = allItems.filter(i => i.ml !== item.ml);

  if (item.type==='letter' || item.type==='matra') {
    const wrongRoms = shuffle(others.filter(i=>i.rom!==item.rom)).slice(0,3).map(i=>i.rom);
    if (wrongRoms.length < 3) return null;
    return {t:'MC', ml:item.ml, q:`What sound does ${item.ml} make?`, ans:item.rom, opts:shuffle([item.rom,...wrongRoms]), isPractice:true};
  }

  if (item.type==='vocab') {
    const vocabOthers = others.filter(i=>i.eng && i.eng!==item.eng);
    if (Math.random()>0.5 && vocabOthers.length>=3) {
      const wrongEngs = shuffle(vocabOthers).slice(0,3).map(i=>i.eng);
      return {t:'MC', ml:item.ml, q:`What does ${item.ml} mean?`, ans:item.eng, opts:shuffle([item.eng,...wrongEngs]), isPractice:true};
    }
    return {t:'FREE', q:`How do you say "${item.eng}" in Malayalam? (romanization)`, ans:item.rom, hint:`Hint: ${item.ml}`, isPractice:true};
  }
  return null;
}

function startPractice() {
  const queue = buildPracticeQueue();
  if (queue.length === 0) return;
  S = {...S, screen:'practice-session', practiceQueue:queue, practiceEi:0, practiceScore:0, lxp:0, fb:null, ft:'', mcPicked:null};
  render();
}

function nextPracticeEx() {
  const newIdx = S.practiceEi + 1;
  if (newIdx >= S.practiceQueue.length) {
    // Practice complete — restore +3 hearts (capped at 5) + XP
    const newHearts = Math.min(5, S.hearts + 3);
    const bonusXp = S.practiceScore * 3;
    const today = new Date().toDateString();
    const newXpByDay = {...S.stats.xpByDay, [today]: (S.stats.xpByDay[today]||0) + S.lxp + bonusXp};
    S = {...S,
      screen: 'practice-results',
      hearts: newHearts,
      xp: S.xp + S.lxp + bonusXp,
      fb:null, ft:'', mcPicked:null,
      stats: {...S.stats, xpByDay:newXpByDay},
    };
    saveProgress(); render();
    setTimeout(launchConfetti, 100);
  } else {
    S = {...S, practiceEi:newIdx, fb:null, ft:'', mcPicked:null};
    render();
  }
}

function recordStat(correct) {
  const e = getEx();
  const lid = S.lid;
  if (!S.stats.lessonAcc[lid]) S.stats.lessonAcc[lid] = { correct:0, total:0 };
  S.stats.lessonAcc[lid].total++;
  if (correct) S.stats.lessonAcc[lid].correct++;
  if (!correct && e) {
    const label = e.ml || e.result || (e.q||'').slice(0,30);
    S.stats.wrongItems[label] = (S.stats.wrongItems[label] || 0) + 1;
  }
}

function good(pts=5, msg='Correct! 🎉') {
  playSound('correct'); recordStat(true);
  const inP = S.screen === 'practice-session';
  if (inP) { S.practiceScore++; pts = 3; }
  S = {...S, lxp:S.lxp+pts, fb:{ok:true,msg}};
  render();
}
function bad(msg) {
  playSound('wrong'); recordStat(false);
  const inP = S.screen === 'practice-session';
  const newHearts = inP ? S.hearts : Math.max(0, S.hearts - 1);
  const noHeartsMsg = !inP && newHearts === 0 ? ' No hearts left — finish this lesson, then practice to continue ❤️' : '';
  S = {...S, hearts:newHearts, fb:{ok:false, msg: msg + noHeartsMsg}};
  if (!inP) saveProgress();
  render();
}

function handleMC(opt, ans) {
  if (S.fb) return;
  S.mcPicked = opt;
  render();
  setTimeout(() => { opt===ans ? good() : bad(`The answer is "${ans}"`); }, 120);
}

async function handleFree() {
  const e = getEx();
  if (S.grading || !S.ft.trim()) return;
  const inp = S.ft.trim().toLowerCase().replace(/[.,!?]/g,'').trim();
  const ans = e.ans.toLowerCase();
  const alts = (e.alts || []).map(a => a.toLowerCase());
  if (ans.split(' / ').some(v=>inp===v) || inp===ans || alts.includes(inp)) { good(8); return; }
  S.grading = true; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,
        messages:[{role:'user',content:`Language learning. Q:"${e.q}" Correct:"${e.ans}". Student:"${S.ft.trim()}". Acceptable? JSON only: {"ok":true} or {"ok":false}`}]})
    });
    const d = await res.json();
    const r = JSON.parse((d.content?.[0]?.text||'{"ok":false}').replace(/```json|```/g,'').trim());
    r.ok ? good(8) : bad(`The answer is "${e.ans}"`);
  } catch { bad(`The answer is "${e.ans}"`); }
  S.grading = false; render();
}

function handleMatch(side, val) {
  const e = getEx();
  if (!e?.pairs || S.fb || S.mDone.includes(val) || S.mWrong) return;
  if (!S.mSel) { S.mSel={side,val}; render(); return; }
  if (S.mSel.side===side) { S.mSel={side,val}; render(); return; }
  const lv = side==='L'?val:S.mSel.val, rv = side==='R'?val:S.mSel.val;
  const hit = e.pairs.find(p=>p.ml===lv&&p.rom===rv);
  if (hit) {
    const nd=[...S.mDone,lv,rv]; S.mDone=nd; S.mSel=null; render();
    if (nd.length>=e.pairs.length*2) setTimeout(()=>good(10,'All matched! 🎉'),200);
  } else {
    S.mWrong=[S.mSel.val,val]; render();
    setTimeout(()=>{ S.mWrong=null; S.mSel=null; render(); },700);
  }
}

function render() {
  const savedFt = document.getElementById('free-input')?.value ?? S.ft;
  document.getElementById('root').innerHTML = buildApp();
  S.ft = savedFt;
  const inp = document.getElementById('free-input');
  if (inp) {
    inp.value = S.ft;
    inp.addEventListener('input', e => S.ft = e.target.value);
    inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!S.fb) handleFree(); });
    if (!S.fb) setTimeout(()=>inp.focus(),50);
  }
}

function buildApp() {
  if (!S.onboarded)                  return buildOnboarding();
  if (S.screen==='home')             return buildHome();

  if (S.screen==='practice')         return buildPractice();
  if (S.screen==='practice-session') return buildPracticeSession();
  if (S.screen==='practice-results') return buildPracticeResults();
  if (S.screen==='learn')            return buildLearn();

}

          <div style="font-size:24px">${u.icon}</div>
          <div style="flex:1">
            <div style="font-size:9px;font-weight:900;opacity:0.55;letter-spacing:2px;margin-bottom:2px">UNIT ${u.id}</div>
            <div style="font-size:16px;font-weight:900">${u.title}</div>
            <div style="font-size:12px;opacity:0.65;font-weight:700">${u.sub}</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:4px 12px;font-size:12px;font-weight:900">${uDone}/${uLessons.length}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">${lessonsHTML}</div>
      </div>`;
  }

  // Mode toggle banner (Language First only)
  const modeBanner = isLF ? `
    <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:14px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">🗣️</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:900;color:#1E40AF">Language First mode</div>
        <div style="font-size:12px;color:#3B82F6;font-weight:700">Script lessons hidden — <button data-action="toggle-mode" style="background:none;border:none;color:#2563EB;font-weight:900;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:underline;padding:0">Switch to Full Course</button></div>
      </div>
    </div>` : `
    <div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:14px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">📜</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:900;color:#065F46">Full Course mode</div>
        <div style="font-size:12px;color:#059669;font-weight:700">Learning script + language — <button data-action="toggle-mode" style="background:none;border:none;color:#059669;font-weight:900;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:underline;padding:0">Switch to Language First</button></div>
      </div>
    </div>`;

  return `
    <div style="min-height:100vh;background:#F7F2EB;padding-bottom:80px">
      <div style="background:linear-gradient(135deg,#0D5C39,#093d27);padding:28px 20px 30px;color:white;overflow:hidden;position:relative">
        <div style="position:absolute;top:-40px;right:-20px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04)"></div>
        <div style="max-width:520px;margin:0 auto;position:relative">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="ml" style="font-size:30px;font-weight:700;line-height:1">മലയാളം</div>
              <div style="font-size:10px;opacity:0.6;font-weight:900;margin-top:5px;letter-spacing:2.5px">MALAYALAM</div>
            </div>
            <div style="display:flex;gap:10px">
              <div style="background:rgba(255,255,255,0.1);border-radius:14px;padding:10px 14px;text-align:center;border:1px solid rgba(255,255,255,0.14)">
                <div style="font-size:20px;font-weight:900;color:#fb923c;line-height:1">🔥${S.streak}</div>
                <div style="font-size:9px;opacity:0.6;font-weight:900;margin-top:5px;letter-spacing:1px">STREAK</div>
              </div>
              <div style="background:rgba(255,255,255,0.1);border-radius:14px;padding:10px 14px;text-align:center;border:1px solid rgba(255,255,255,0.14)">
                <div style="font-size:20px;font-weight:900;color:#F5A623;line-height:1">⚡${S.xp}</div>
                <div style="font-size:9px;opacity:0.6;font-weight:900;margin-top:5px;letter-spacing:1px">XP</div>
              </div>
            </div>
          </div>
          <div style="margin-top:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;font-weight:800;opacity:0.7">
              <span>${trackDone} / ${trackLessons.length} lessons complete</span>
              <span>${Math.round(trackDone/trackLessons.length*100)}%</span>
            </div>
            <div style="height:6px;background:rgba(255,255,255,0.15);border-radius:999px;margin-bottom:12px">
              <div style="height:100%;border-radius:999px;background:#F5A623;width:${Math.round(trackDone/trackLessons.length*100)}%;transition:width 0.5s"></div>
            </div>
            <!-- Daily goal tracker -->
            <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,0.12)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
                <span style="font-size:11px;font-weight:900;opacity:0.8">TODAY'S GOAL</span>
                <span style="font-size:11px;font-weight:900;color:${goalMet?'#6EE7B7':'rgba(255,255,255,0.6)'}">${goalMet?'✅ DONE!':'📚 '+todayCount+' / '+S.dailyGoal+' lesson'+(S.dailyGoal>1?'s':'')}</span>
              </div>
              <div style="height:8px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden">
                <div style="height:100%;border-radius:999px;background:${goalMet?'#6EE7B7':'#F5A623'};width:${goalPct}%;transition:width 0.5s"></div>
              </div>
              ${goalMet ? '' : `<div style="font-size:10px;opacity:0.55;font-weight:700;margin-top:5px">${S.dailyGoal - todayCount} more lesson${S.dailyGoal-todayCount>1?'s':''} to hit your goal</div>`}
            </div>
          </div>
        </div>
      </div>
      <div style="max-width:520px;margin:0 auto;padding:20px 16px 0">
        ${reminderBanner}
        ${S.hearts === 0 ? `<div style="background:#FEE2E2;border:1px solid #FECACA;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">💔</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:900;color:#DC2626">No hearts remaining</div>
            <div style="font-size:12px;color:#B91C1C;font-weight:700;margin-top:2px">Complete a practice session to unlock new lessons. 1 session = 3 hearts, 2 sessions = 5 hearts.</div>
          </div>
          <button data-action="nav-practice" style="background:#DC2626;color:white;border:none;border-radius:12px;padding:10px 14px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;flex-shrink:0">Practice 🎯</button>
        </div>` : ''}
        ${modeBanner}
        ${unitsHTML}
      </div>
    </div>
    ${buildNav('home')}`;
}

// ─── RESULTS ────────────────────────────────────────────────────────
function buildResults() {
  return `
    <div style="min-height:100vh;background:linear-gradient(135deg,#0D5C39,#093d27);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center">
      <div class="anim-pop"  style="font-size:78px">🎊</div>
      <div class="anim-up"   style="font-size:30px;font-weight:900;color:white;margin-top:8px;animation-delay:0.1s">Lesson Complete!</div>
      <div class="anim-up"   style="font-size:14px;color:rgba(255,255,255,0.6);margin-top:6px;font-weight:700;animation-delay:0.15s">${S.streak >= 7 ? '🔥 ' + S.streak + ' day streak — incredible!' : S.streak >= 3 ? '🔥 ' + S.streak + ' days in a row!' : "You're making great progress! 🌴"}</div>
      <div class="anim-xp"   style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.14);border-radius:24px;padding:22px 52px;margin-top:30px">
        <div style="font-size:54px;font-weight:900;color:#F5A623;line-height:1">+${S.lxp}</div>
        <div style="font-size:11px;font-weight:900;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:1.5px">XP EARNED</div>
      </div>
      <div class="anim-up" style="display:flex;gap:14px;margin-top:18px;animation-delay:0.35s">
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="font-size:22px;font-weight:900;color:#fb923c">🔥${S.streak}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">DAY STREAK</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="display:flex;gap:2px;justify-content:center">${heartsHTML()}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">HEARTS</div>
          <div style="font-size:8px;font-weight:700;color:rgba(255,255,255,0.35);margin-top:2px">refills daily</div>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:16px;padding:13px 20px;border:1px solid rgba(255,255,255,0.1);text-align:center">
          <div style="font-size:20px;font-weight:900;color:#F5A623">⚡${S.xp}</div>
          <div style="font-size:9px;font-weight:900;color:rgba(255,255,255,0.5);margin-top:5px;letter-spacing:1px">TOTAL XP</div>
        </div>
      </div>
      <button data-action="go-home" class="anim-up" style="margin-top:34px;background:#F5A623;color:#093d27;border:none;border-radius:16px;padding:15px 54px;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:0.5px;animation-delay:0.45s">CONTINUE →</button>
    </div>`;
}

// ─── LESSON ─────────────────────────────────────────────────────────
function buildLesson() {
  const l = getLesson(), e = getEx();
  if (!l||!e) return '';
  const prog = S.resolvedEx.length > 0 ? S.ei / S.resolvedEx.length : 0;

  let exHTML = '';
  if (e.t==='INTRO') exHTML = buildIntro(e);
  if (e.t==='MC')    exHTML = buildMC(e);
  if (e.t==='MATCH') exHTML = buildMatch(e);
  if (e.t==='FREE')  exHTML = buildFree(e);
  if (e.t==='VOCAB' || e.t==='SENT')  exHTML = buildVocab(e);
  if (e.t==='MATRA') exHTML = buildMatra(e);

  const fbHTML = S.fb ? `
    <div style="position:sticky;bottom:0;background:${S.fb.ok?'#059669':'#DC2626'};padding:18px 22px;border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.14)">
      <div>
        <div style="font-size:17px;font-weight:900;color:white">${S.fb.msg}</div>
        ${!S.fb.ok?'<div style="font-size:13px;color:rgba(255,255,255,0.78);margin-top:3px;font-weight:700">Every mistake is a lesson 💪</div>':''}
      </div>
      <button data-action="next-ex" style="background:white;border:none;border-radius:14px;padding:12px 24px;font-size:14px;font-weight:900;cursor:pointer;color:${S.fb.ok?'#059669':'#DC2626'};white-space:nowrap;flex-shrink:0">CONTINUE →</button>
    </div>` : '';

  return `
    <div style="min-height:100vh;background:#F7F2EB;display:flex;flex-direction:column">
      <div style="background:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #E7E5E4;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,0.06)">
        <button data-action="go-home" style="background:none;border:none;font-size:18px;cursor:pointer;color:#78716C;padding:4px 6px;line-height:1">✕</button>
        <div style="flex:1;height:12px;background:#E7E5E4;border-radius:999px;overflow:hidden">
          <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#0D5C39,#1a8a56);width:${prog*100}%;transition:width 0.4s ease"></div>
        </div>
        <div style="display:flex;gap:2px">${heartsHTML()}</div>
      </div>
      ${S.hearts===0 ? `<div style="background:#FEE2E2;border-bottom:1px solid #FECACA;padding:8px 16px;display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">💔</span>
        <span style="font-size:12px;font-weight:800;color:#DC2626;flex:1">No hearts — finish this lesson, then practice to continue</span>
        <button data-action="nav-practice" style="background:#DC2626;color:white;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:900;cursor:pointer">Practice →</button>
      </div>` : ''}
      <div style="flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:22px 18px 16px">
        ${exHTML}
      </div>
      ${fbHTML}
    </div>`;
}

function buildIntro(e) {
  const parts  = e.eg.split('·');
  const mlWord = parts[0].trim();
  const rest   = parts.slice(1).join('·').trim();
  const isLF   = S.mode === 'language-first';
  const label  = isLF ? 'NEW WORD' : 'NEW LETTER';
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:10px;font-weight:900;color:#0D5C39;letter-spacing:2px">${label}</div>
        <div style="font-size:10px;color:#78716C;font-weight:700">🤖 computer voice</div>
      </div>
      <div style="background:#fff;border-radius:24px;padding:32px 28px 24px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
        ${isLF
          ? `<div style="font-size:32px;font-weight:900;color:#F5A623;letter-spacing:1px">${e.rom}</div>
             <div class="ml" style="font-size:22px;color:#A8A29E;line-height:1.2">${e.ml}</div>`
          : `<div class="ml" style="font-size:${mlSize(e.ml)}px;font-weight:700;color:#0D5C39;line-height:1.15">${e.ml}</div>`
        }
        <button data-action="speak" data-text="${esc(e.ml)}" style="background:#FEF3C7;border:2px solid #F5A623;border-radius:50px;padding:8px 22px;font-size:15px;font-weight:900;cursor:pointer;color:#d4891e;display:flex;align-items:center;gap:8px">
          🔈 <span style="letter-spacing:1px">${e.rom}</span>
        </button>
        <div style="background:#FEF3C7;border-radius:12px;padding:9px 20px;font-size:13px;font-weight:800;color:#92400E;max-width:300px">${e.hint}</div>
        <button data-action="speak" data-text="${esc(mlWord)}" style="background:none;border:1px solid #E7E5E4;border-radius:10px;padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%">
          <span class="ml" style="font-size:15px;color:#1C1917">${mlWord}</span>
          <span style="font-size:12px;color:#78716C;font-weight:700"> · ${rest}</span>
          <span style="color:#F5A623;flex-shrink:0">🔈</span>
        </button>
      </div>
      <button data-action="next-ex" style="margin-top:16px;background:#0D5C39;color:white;border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;width:100%">GOT IT →</button>
    </div>`;
}

function buildMC(e) {
  let optsHTML = '';
  for (const opt of e.opts) {
    let bg='#fff', bdr='2px solid #E7E5E4', col='#1C1917';
    if (S.fb&&opt===e.ans)           {bg='#D1FAE5';bdr='2px solid #059669';col='#059669';}
    else if (S.mcPicked===opt&&!S.fb){bg='#FEF3C7';bdr='2px solid #F5A623';col='#d4891e';}
    const ff = e.flip ? "'Noto Serif Malayalam',serif" : "'Nunito',sans-serif";
    const fs = e.flip ? 24 : 15;
    optsHTML += `<button data-action="mc-pick" data-opt="${esc(opt)}" data-ans="${esc(e.ans)}" style="background:${bg};border:${bdr};border-radius:14px;padding:15px 10px;font-size:${fs}px;font-weight:800;cursor:${S.fb?'default':'pointer'};color:${col};font-family:${ff};box-shadow:0 2px 14px rgba(0,0,0,0.10)">${opt}</button>`;
  }
  const display = !e.flip
    ? `<div style="display:flex;flex-direction:column;align-items:center;gap:10px">
         <div class="ml" style="font-size:${mlSize(e.ml||'')}px;font-weight:700;color:#0D5C39">${e.ml}</div>
         <button data-action="speak" data-text="${esc(e.ml)}" style="background:#FEF3C7;border:2px solid #F5A623;border-radius:50px;padding:5px 16px;font-size:13px;font-weight:900;cursor:pointer;color:#d4891e;display:inline-flex;align-items:center;gap:5px">🔈 hear it</button>
       </div>`
    : `<div style="font-size:34px;font-weight:900;color:#0D5C39">"${e.flabel}"</div>`;
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:15px;font-weight:800;color:#1C1917;margin-bottom:16px">${e.q}</div>
      <div style="background:#fff;border-radius:22px;padding:26px 22px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);margin-bottom:18px">
        ${display}
        <div style="font-size:12px;color:#78716C;margin-top:10px;font-weight:800">${e.flip?'→ Tap the matching letter':'→ Tap the correct answer'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${optsHTML}</div>
    </div>`;
}

function buildMatch(e) {
  const rs = S.shuffled.length===e.pairs.length ? S.shuffled : e.pairs;
  let lHTML='', rHTML='';
  for (const p of e.pairs) {
    const done=S.mDone.includes(p.ml),sel=S.mSel?.side==='L'&&S.mSel.val===p.ml,wrg=S.mWrong?.includes(p.ml);
    lHTML+=`<button data-action="match-l" data-val="${esc(p.ml)}" style="flex:1;background:${done?'#D1FAE5':wrg?'#FEE2E2':sel?'#FEF3C7':'#fff'};border:2px solid ${done?'#059669':wrg?'#DC2626':sel?'#F5A623':'#E7E5E4'};border-radius:14px;padding:8px 6px;font-family:'Noto Serif Malayalam',serif;font-size:${mlSize(p.ml)}px;font-weight:700;color:${done?'#059669':wrg?'#DC2626':sel?'#d4891e':'#1C1917'};cursor:${done?'default':'pointer'};opacity:${done?0.5:1};line-height:1.2;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:58px">
      ${p.ml}<span data-action="speak" data-text="${esc(p.ml)}" style="font-size:10px;font-family:'Nunito',sans-serif;opacity:0.55">🔈</span>
    </button>`;
  }
  for (const p of rs) {
    const done=S.mDone.includes(p.rom),sel=S.mSel?.side==='R'&&S.mSel.val===p.rom,wrg=S.mWrong?.includes(p.rom);
    rHTML+=`<button data-action="match-r" data-val="${esc(p.rom)}" style="flex:1;background:${done?'#D1FAE5':wrg?'#FEE2E2':sel?'#FEF3C7':'#fff'};border:2px solid ${done?'#059669':wrg?'#DC2626':sel?'#F5A623':'#E7E5E4'};border-radius:14px;padding:8px 6px;font-size:14px;font-weight:900;color:${done?'#059669':wrg?'#DC2626':sel?'#d4891e':'#1C1917'};cursor:${done?'default':'pointer'};opacity:${done?0.5:1};min-height:58px">${p.rom}</button>`;
  }
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:15px;font-weight:800;color:#1C1917;margin-bottom:4px">Match the pairs</div>
      <div style="font-size:13px;color:#78716C;font-weight:700;margin-bottom:16px">Tap a letter, then tap its romanization</div>
      <div style="display:flex;gap:10px;flex:1">
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">${lHTML}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">${rHTML}</div>
      </div>
    </div>`;
}

function buildFree(e) {
  const iBdr = S.fb?(S.fb.ok?'#059669':'#DC2626'):'#E7E5E4';
  const iBg  = S.fb?(S.fb.ok?'#D1FAE5':'#FEE2E2'):'#fff';
  const bBg  = S.ft.trim()&&!S.grading?'#0D5C39':'#E7E5E4';
  return `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="font-size:15px;font-weight:800;color:#1C1917;margin-bottom:14px">Translate this</div>
      <div style="background:#fff;border-radius:20px;padding:24px 22px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,0.10);margin-bottom:18px">
        <div style="font-size:17px;font-weight:800;color:#1C1917;line-height:1.45">${e.q}</div>
        <div style="font-size:13px;color:#78716C;margin-top:12px;font-weight:700">Hint: ${e.hint}</div>
      </div>
      <input id="free-input" type="text" placeholder="Type your answer…" ${S.fb||S.grading?'disabled':''}
        style="border:2px solid ${iBdr};border-radius:14px;padding:15px 16px;font-size:16px;font-weight:800;background:${iBg};color:#1C1917;outline:none;margin-bottom:13px;width:100%"/>
      ${!S.fb?`<button data-action="check-free" style="background:${bBg};color:white;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:900;cursor:${S.ft.trim()&&!S.grading?'pointer':'default'};width:100%">${S.grading?'Checking ✨':'CHECK'}</button>`:''}
    </div>`;
}

function buildVocab(e) {
  const isSent = e.t === 'SENT';
  const wordsHTML = isSent && e.words
    ? e.words.map(w => `
        <div style="background:#F7F2EB;border-radius:8px;padding:6px 12px;text-align:center">
          <div class="ml" style="font-size:15px;color:#0D5C39;font-weight:700">${w.ml}</div>
          <div style="font-size:11px;color:#78716C;font-weight:700;margin-top:1px">${w.eng}</div>
        </div>`).join('')

// ─── STATS ──────────────────────────────────────────────────────────
function buildStats() {
  const acc = S.stats.lessonAcc;
  const totalCorrect = Object.values(acc).reduce((s,v)=>s+v.correct,0);
  const totalAttempts = Object.values(acc).reduce((s,v)=>s+v.total,0);
  const overallPct = totalAttempts > 0 ? Math.round(totalCorrect/totalAttempts*100) : 0;

  // Weekly XP chart — last 7 days
  const days = Array.from({length:7}).map((_,i) => {
    const d = new Date(Date.now() - (6-i)*86400000);
    return { label: d.toLocaleDateString('en',{weekday:'short'}), key: d.toDateString() };
  });
  const maxXp = Math.max(1, ...days.map(d => S.stats.xpByDay[d.key]||0));
  const chartBars = days.map(d => {
    const xp = S.stats.xpByDay[d.key] || 0;
    const h = Math.max(4, Math.round((xp/maxXp)*80));
    const isToday = d.key === new Date().toDateString();
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:10px;font-weight:800;color:${xp>0?'#0D5C39':'#A8A29E'}">${xp||''}</div>
      <div style="width:100%;background:${isToday?'#0D5C39':xp>0?'#6EE7B7':'#E7E5E4'};border-radius:6px 6px 0 0;height:${h}px;min-height:4px;transition:height 0.3s"></div>
      <div style="font-size:10px;font-weight:800;color:${isToday?'#0D5C39':'#A8A29E'}">${d.label}</div>
    </div>`;
  }).join('');

  // Needs work — top 5 wrong items
  const sorted = Object.entries(S.stats.wrongItems).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const wrongHTML = sorted.length === 0
    ? `<div style="text-align:center;color:#A8A29E;font-size:13px;font-weight:700;padding:16px">No mistakes yet — amazing! 🌟</div>`
    : sorted.map(([label, count]) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F7F2EB">
          <span class="ml" style="font-size:22px;color:#1C1917">${label}</span>
          <span style="background:#FEE2E2;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:900;color:#DC2626">${count} miss${count>1?'es':''}</span>
        </div>`).join('');

  // Lesson accuracy list
  const lessonRows = LESSONS.filter(l => acc[l.id]).map(l => {
    const {correct,total} = acc[l.id];
    const pct = Math.round(correct/total*100);
    const col = pct>=80?'#059669':pct>=60?'#D97706':'#DC2626';
    return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #F7F2EB">
      <div style="font-size:18px">${l.emoji}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:900;color:#1C1917">${l.title}</div>
        <div style="height:5px;background:#E7E5E4;border-radius:99px;margin-top:4px;overflow:hidden">
          <div style="height:100%;background:${col};border-radius:99px;width:${pct}%"></div>
        </div>
      </div>
      <div style="font-size:13px;font-weight:900;color:${col}">${pct}%</div>
    </div>`;
  }).join('');

  return `
    <div style="min-height:100vh;background:#F7F2EB;padding-bottom:80px">
      <div style="background:linear-gradient(135deg,#0D5C39,#093d27);padding:28px 20px 24px;color:white">
        <div style="max-width:520px;margin:0 auto">
          <div style="font-size:22px;font-weight:900">Your Stats 📊</div>
          <div style="font-size:13px;opacity:0.65;font-weight:700;margin-top:3px">Track your Malayalam journey</div>
          <div style="display:flex;gap:10px;margin-top:16px">
            ${[['🔥',S.streak,'Day Streak'],['⚡',S.xp,'Total XP'],['✅',S.done.size,'Lessons Done']].map(([icon,val,label])=>`
              <div style="flex:1;background:rgba(255,255,255,0.1);border-radius:14px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.14)">
                <div style="font-size:18px;font-weight:900;color:#F5A623">${icon}${val}</div>
                <div style="font-size:9px;opacity:0.6;font-weight:900;margin-top:3px;letter-spacing:1px">${label}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div style="max-width:520px;margin:0 auto;padding:20px 16px 0">

        <!-- Overall accuracy -->
        <div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:11px;font-weight:900;color:#78716C;letter-spacing:1.5px;margin-bottom:12px">OVERALL ACCURACY</div>
          <div style="display:flex;align-items:center;gap:14px">
            <div style="font-size:42px;font-weight:900;color:${overallPct>=80?'#059669':overallPct>=60?'#D97706':'#DC2626'}">${overallPct}%</div>
            <div style="flex:1">
              <div style="height:10px;background:#E7E5E4;border-radius:99px;overflow:hidden">
                <div style="height:100%;background:${overallPct>=80?'#059669':overallPct>=60?'#D97706':'#DC2626'};border-radius:99px;width:${overallPct}%;transition:width 0.5s"></div>
              </div>
              <div style="font-size:12px;color:#78716C;font-weight:700;margin-top:6px">${totalCorrect} correct out of ${totalAttempts} attempts</div>
            </div>
          </div>
        </div>

        <!-- Weekly XP chart -->
        <div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:11px;font-weight:900;color:#78716C;letter-spacing:1.5px;margin-bottom:16px">XP THIS WEEK</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:110px">${chartBars}</div>
        </div>

        <!-- Needs work -->
        <div style="background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:11px;font-weight:900;color:#78716C;letter-spacing:1.5px;margin-bottom:4px">NEEDS MORE PRACTICE</div>
          ${wrongHTML}
        </div>

        <!-- Lesson accuracy -->
        ${lessonRows.length > 0 ? `
        <div style="background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:11px;font-weight:900;color:#78716C;letter-spacing:1.5px;margin-bottom:4px">ACCURACY BY LESSON</div>
          ${lessonRows}
        </div>` : ''}
      </div>
    </div>
    ${buildNav('stats')}`;
}

function buildLearnScript() {
  const card = (ml, rom, color, covered) => `
    <button data-action="speak" data-text="${esc(ml)}"
      style="background:#fff;border:1px solid #E7E5E4;border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;flex:1;min-width:54px;opacity:${covered?1:0.38}">

      <div style="font-size:9px;font-weight:800;color:#78716C;margin-top:3px">${rom}</div>
    </button>`;

  const section = (title, icon, color, content, covered) => `
    <div style="margin-bottom:24px;opacity:${covered?1:0.55}">
      <div style="background:${color};border-radius:14px;padding:10px 16px;color:white;display:flex;align-items:center;gap:8px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12)">
        <span style="font-size:18px">${icon}</span>
        <span style="font-size:14px;font-weight:900">${title}</span>
        ${covered?'':'<span style="margin-left:auto;font-size:11px;opacity:0.7">Not yet covered</span>'}
      </div>
      ${content}
    </div>`;

  const row = cards => `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px">${cards}</div>`;

  const vc = sectionDone(SCRIPT_COVERAGE.vowels);
  const cc = sectionDone(SCRIPT_COVERAGE.consonants);
  const mc = sectionDone(SCRIPT_COVERAGE.matras);
  const lc = sectionDone(SCRIPT_COVERAGE.chillu);
  const nc = sectionDone(SCRIPT_COVERAGE.numbers);

  const vowelsHTML = row([
    ['അ','a'],['ആ','aa'],['ഇ','i'],['ഈ','ii'],['ഉ','u'],['ഊ','uu'],
    ['എ','e'],['ഏ','ee'],['ഐ','ai'],['ഒ','o'],['ഓ','oo'],['ഔ','au'],
  ].map(([ml,rom])=>card(ml,rom,'#0D5C39',vc)).join(''));

  const cGroups = [
    {label:'Velar',     color:'#1D4ED8', letters:[['ക','ka'],['ഖ','kha'],['ഗ','ga'],['ഘ','gha'],['ങ','nga']]},
    {label:'Palatal',   color:'#1D4ED8', letters:[['ച','cha'],['ഛ','chha'],['ജ','ja'],['ഝ','jha'],['ഞ','nya']]},
    {label:'Retroflex', color:'#9A3412', letters:[['ട','tt'],['ഠ','tth'],['ഡ','dd'],['ഢ','ddh'],['ണ','nn']]},
    {label:'Dental',    color:'#9A3412', letters:[['ത','tha'],['ഥ','thha'],['ദ','dha'],['ധ','dhha'],['ന','na']]},
    {label:'Labial',    color:'#065F46', letters:[['പ','pa'],['ഫ','pha'],['ബ','ba'],['ഭ','bha'],['മ','ma']]},
    {label:'Semivowel', color:'#065F46', letters:[['യ','ya'],['ര','ra'],['ല','la'],['വ','va']]},
    {label:'Sibilant',  color:'#4C1D95', letters:[['ശ','sha'],['ഷ','shha'],['സ','sa'],['ഹ','ha']]},
    {label:'Special',   color:'#4C1D95', letters:[['ള','ll'],['ഴ','zh'],['റ','rra']]},
  ];
  const consHTML = cGroups.map(g => `
    <div style="margin-bottom:10px">
      <div style="font-size:9px;font-weight:900;color:#A8A29E;letter-spacing:1.5px;margin-bottom:5px">${g.label.toUpperCase()}</div>
      ${row(g.letters.map(([ml,rom])=>card(ml,rom,g.color,cc)).join(''))}
    </div>`).join('');

  const matrasHTML = `
    <div style="font-size:11px;color:#78716C;font-weight:700;margin-bottom:8px">Using ക (ka) as base — tap to hear 🔈</div>
    ${row([['കാ','kaa'],['കി','ki'],['കീ','kii'],['കു','ku'],['കൂ','kuu'],
           ['കെ','ke'],['കേ','kee'],['കൈ','kai'],['കൊ','ko'],['കോ','koo'],['ക്','k·']
    ].map(([ml,rom])=>card(ml,rom,'#0E7490',mc)).join(''))}`;

  const chilluHTML = `
    <div style="font-size:11px;color:#78716C;font-weight:700;margin-bottom:8px">Final consonant forms</div>
    ${row([['ൻ','n'],['ർ','r'],['ൽ','l'],['ൾ','ll'],['ൺ','nn']

  const numsHTML = row([

  ].map(([ml,rom])=>card(ml,rom,'#B45309',nc)).join(''));

  return `
    ${section('Vowels · സ്വരങ്ങൾ',       '🌊', '#0D5C39', vowelsHTML,  vc)}
    ${section('Consonants · വ്യഞ്ജനങ്ങൾ', '🔤', '#1D4ED8', consHTML,   cc)}
    ${section('Matras · Vowel Signs',      '✍️', '#0E7490', matrasHTML, mc)}
    ${section('Chillu Letters',            '⭐', '#4C1D95', chilluHTML, lc)}
    ${section('Numbers · സംഖ്യകൾ',        '🔢', '#B45309', numsHTML,   nc)}`;
}

        {label:"ഇല്ല",  rom:"illa",  eng:"is not / there is no — വെള്ളം ഇല്ല"},
      ]},
    { title:"Cases", icon:"📐", color:"#065F46", coverage: GRAMMAR_COVERAGE.pronouns,
      items:[
        {label:"Nominative", rom:"subject",   eng:"ഞാൻ — I (doing the action)"},
        {label:"Dative",     rom:"+ക്ക്",     eng:"എനിക്ക് — to me / for me (want, need, like)"},
        {label:"Accusative", rom:"+എ",        eng:"എന്നെ — me (receiving the action)"},
        {label:"Genitive",   rom:"+ഉടെ",      eng:"എന്റെ — my (possession)"},
        {label:"Locative",   rom:"+ഇൽ",       eng:"വീട്ടിൽ — at home (place)"},
        {label:"Sociative",  rom:"+ഓടെ",      eng:"എന്നോടെ — with me"},
        {label:"Ablative",   rom:"+ഇൽ നിന്ന്",eng:"വീട്ടിൽ നിന്ന് — from home"},
      ]},
    { title:"Present Tense", icon:"▶️", color:"#0891B2", coverage: GRAMMAR_COVERAGE.presentTense,
      items:[
        {label:"കഴിക്കുന്നു", rom:"kazhikkunnu",  eng:"(I/he/she) eat/s"},
        {label:"പോകുന്നു",   rom:"pokunnu",       eng:"(I/he/she) go/goes"},
        {label:"വരുന്നു",    rom:"varunnu",       eng:"(I/he/she) come/s"},
        {label:"കാണുന്നു",   rom:"kaanunnu",      eng:"(I/he/she) see/s"},
      ]},
    { title:"Past Tense", icon:"⏪", color:"#9A3412", coverage: GRAMMAR_COVERAGE.pastTense,
      items:[
        {label:"കഴിച്ചു",  rom:"kazhichu",  eng:"ate"},
        {label:"പോയി",    rom:"poyi",      eng:"went"},
        {label:"വന്നു",   rom:"vannu",     eng:"came"},
        {label:"കണ്ടു",   rom:"kandu",     eng:"saw"},
      ]},
    { title:"Questions", icon:"❓", color:"#4C1D95", coverage: GRAMMAR_COVERAGE.questions,
      items:[
        {label:"എന്ത്",   rom:"enthu",    eng:"what"},
        {label:"എവിടെ",  rom:"evide",    eng:"where"},
        {label:"എപ്പോൾ", rom:"eppol",    eng:"when"},
        {label:"ആര്",    rom:"aar",      eng:"who"},
        {label:"എന്തുകൊണ്ട്",rom:"enthukond",eng:"why"},
        {label:"എങ്ങനെ", rom:"engane",   eng:"how"},
      ]},
    { title:"Future & Intention", icon:"⏩", color:"#B45309", coverage: GRAMMAR_COVERAGE.future,
      items:[
        {label:"പോകും",       rom:"pokum",          eng:"will go"},
        {label:"പോകണം",      rom:"pokanam",        eng:"need to go / want to go"},
        {label:"പോകട്ടെ",    rom:"pokatte",        eng:"let (me/it) go"},
      ]},
  ];

  return GRAMMAR_SECTIONS.map(sec => {
    const covered = sectionDone(sec.coverage);
    const itemsHTML = sec.items.map(item => `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F7F2EB;opacity:${covered?1:0.5}">
        <div style="min-width:110px">
          <div class="ml" style="font-size:16px;color:#0D5C39;font-weight:700">${item.label}</div>
          <div style="font-size:10px;color:#F5A623;font-weight:800;margin-top:1px">${item.rom}</div>
        </div>
        <div style="font-size:12px;color:#78716C;font-weight:700;flex:1;line-height:1.4">${item.eng}</div>
      </div>`).join('');

    return `
      <div style="margin-bottom:20px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,0.07)">
        <div style="background:${sec.color};padding:12px 16px;color:white;display:flex;align-items:center;gap:8px;opacity:${covered?1:0.6}">
          <span style="font-size:16px">${sec.icon}</span>
          <span style="font-size:14px;font-weight:900">${sec.title}</span>
          ${covered?'<span style="margin-left:auto;font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:99px">✓ covered</span>':'<span style="margin-left:auto;font-size:11px;opacity:0.7">complete lessons to unlock</span>'}
        </div>
        <div style="padding:0 14px">${itemsHTML}</div>
      </div>`;
  }).join('');
}

// ─── PRACTICE LANDING ───────────────────────────────────────────────

// ─── PRACTICE LANDING ───────────────────────────────────────────────
function buildPractice() {
  const totalDone = S.done.size;
  const needsWork = Object.entries(S.stats.wrongItems)
    .filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
  const itemCount = buildPracticeQueue().length;
  const canPractice = totalDone > 0 && itemCount > 0;

  const topItems = needsWork.slice(0,5).map(([ml,count])=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F7F2EB">
      <span class="ml" style="font-size:22px;color:#1C1917;min-width:80px">${ml}</span>
      <div style="flex:1;height:6px;background:#E7E5E4;border-radius:99px;overflow:hidden">
        <div style="height:100%;background:#DC2626;border-radius:99px;width:${Math.min(100,count*20)}%"></div>
      </div>
      <span style="font-size:12px;font-weight:900;color:#DC2626">${count} miss${count>1?'es':''}</span>
    </div>`).join('');

  return `
    <div style="min-height:100vh;background:#F7F2EB;padding-bottom:80px">
      <div style="background:linear-gradient(135deg,#0D5C39,#093d27);padding:28px 20px 24px;color:white">
        <div style="max-width:520px;margin:0 auto">
          <div style="font-size:22px;font-weight:900">Practice 🎯</div>
          <div style="font-size:13px;opacity:0.65;font-weight:700;margin-top:3px">Spaced repetition — harder items come back more</div>
          <div style="display:flex;gap:10px;margin-top:16px">
            ${[['❤️',S.hearts+'/5','Hearts'],['📚',itemCount,'Items to review'],['✅',totalDone,'Lessons done']].map(([icon,val,label])=>`
              <div style="flex:1;background:rgba(255,255,255,0.1);border-radius:12px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.14)">
                <div style="font-size:16px;font-weight:900;color:#F5A623">${icon} ${val}</div>
                <div style="font-size:9px;opacity:0.6;font-weight:900;margin-top:3px;letter-spacing:1px">${label}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div style="max-width:520px;margin:0 auto;padding:20px 16px 0">

        ${canPractice ? `
        <button data-action="start-practice" style="background:#0D5C39;color:white;border:none;border-radius:20px;padding:20px 24px;width:100%;text-align:left;cursor:pointer;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(13,92,57,0.3);margin-bottom:20px">
          <div style="font-size:40px">🎯</div>
          <div style="flex:1">
            <div style="font-size:18px;font-weight:900">Start Practice Session</div>
            <div style="font-size:13px;opacity:0.75;font-weight:700;margin-top:3px">${itemCount} items · ~3 minutes</div>
          </div>
          <div style="background:rgba(255,255,255,0.2);border-radius:12px;padding:6px 14px;font-size:13px;font-weight:900">+❤️</div>
        </button>` : `
        <div style="background:#fff;border-radius:20px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:40px">${totalDone===0?'🔒':'✨'}</div>
          <div style="font-size:15px;font-weight:900;color:#1C1917;margin-top:12px">${totalDone===0?'Complete some lessons first!':'Nothing to review yet!'}</div>
          <div style="font-size:13px;color:#78716C;font-weight:700;margin-top:6px">${totalDone===0?'Come back after finishing a few lessons':'Keep doing lessons — review items will appear here'}</div>
        </div>`}

        <div style="background:#FEF3C7;border:1px solid #F5A623;border-radius:16px;padding:14px 16px;margin-bottom:20px">
          <div style="font-size:12px;font-weight:900;color:#92400E;margin-bottom:4px">❤️ How hearts work</div>
          <div style="font-size:12px;color:#B45309;font-weight:700;line-height:1.5">Hearts refill to 5 every day. Wrong answers in lessons cost a heart. Complete a practice session to restore 3 hearts — do two sessions to restore fully to 5.</div>
        </div>

        ${needsWork.length > 0 ? `
        <div style="background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 14px rgba(0,0,0,0.08)">
          <div style="font-size:11px;font-weight:900;color:#78716C;letter-spacing:1.5px;margin-bottom:10px">NEEDS MOST WORK</div>
          ${topItems}
        </div>` : ''}
      </div>
    </div>
    ${buildNav('practice')}`;
}

// ─── PRACTICE SESSION ────────────────────────────────────────────────
function buildPracticeSession() {
  const e = S.practiceQueue[S.practiceEi];
  if (!e) return '';
  const prog = S.practiceEi / S.practiceQueue.length;

  let exHTML = '';
  if (e.t==='MC')   exHTML = buildMC(e);
  if (e.t==='FREE') exHTML = buildFree(e);

  const fbHTML = S.fb ? `
    <div style="position:sticky;bottom:0;background:${S.fb.ok?'#059669':'#DC2626'};padding:18px 22px;border-radius:22px 22px 0 0;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.14)">
      <div>
        <div style="font-size:17px;font-weight:900;color:white">${S.fb.msg}</div>
        ${!S.fb.ok?'<div style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:3px;font-weight:700">Added to your review queue 📚</div>':''}
      </div>
      <button data-action="next-ex" style="background:white;border:none;border-radius:14px;padding:12px 24px;font-size:14px;font-weight:900;cursor:pointer;color:${S.fb.ok?'#059669':'#DC2626'};white-space:nowrap;flex-shrink:0">CONTINUE →</button>
    </div>` : '';

  return `
    <div style="min-height:100vh;background:#F7F2EB;display:flex;flex-direction:column">
      <div style="background:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #E7E5E4;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,0.06)">
        <button data-action="nav-practice" style="background:none;border:none;font-size:18px;cursor:pointer;color:#78716C;padding:4px 6px;line-height:1">✕</button>
        <div style="flex:1;height:12px;background:#E7E5E4;border-radius:999px;overflow:hidden">
          <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#F5A623,#fb923c);width:${prog*100}%;transition:width 0.4s ease"></div>
        </div>
        <div style="font-size:12px;font-weight:900;color:#78716C">${S.practiceEi+1}/${S.practiceQueue.length}</div>
      </div>
      <div style="background:#FEF3C7;padding:6px 14px;text-align:center;border-bottom:1px solid #FDE68A">
        <span style="font-size:11px;font-weight:900;color:#92400E">🎯 PRACTICE SESSION · No hearts lost · Earn ❤️ on completion</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;padding:22px 18px 16px">
        ${exHTML}
      </div>
      ${fbHTML}
    </div>`;
}

// ─── PRACTICE RESULTS ────────────────────────────────────────────────
function buildPracticeResults() {
  const acc = S.practiceScore;
  const total = S.practiceQueue.length;
  const pct = total > 0 ? Math.round(acc/total*100) : 0;
  const heartEarned = S.hearts === 5 || (S.hearts < 5);

  return `
    <div style="min-height:100vh;background:linear-gradient(135deg,#F5A623,#d4891e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center">
      <div class="anim-pop" style="font-size:78px">🎯</div>
      <div class="anim-up" style="font-size:28px;font-weight:900;color:white;margin-top:8px">Practice Complete!</div>
      <div class="anim-up" style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:6px;font-weight:700;animation-delay:0.1s">${pct>=80?'Excellent work! 🌟':pct>=60?'Good effort! Keep it up 💪':'Keep practicing — you\'ll get there! 🌴'}</div>

      <div class="anim-xp" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:24px;padding:20px 40px;margin-top:28px;display:flex;gap:24px">
        <div style="text-align:center">
          <div style="font-size:36px;font-weight:900;color:white">${acc}/${total}</div>
          <div style="font-size:10px;font-weight:900;color:rgba(255,255,255,0.65);margin-top:4px;letter-spacing:1px">CORRECT</div>
        </div>
        <div style="width:1px;background:rgba(255,255,255,0.25)"></div>
        <div style="text-align:center">
          <div style="font-size:36px;font-weight:900;color:white">${pct}%</div>
          <div style="font-size:10px;font-weight:900;color:rgba(255,255,255,0.65);margin-top:4px;letter-spacing:1px">ACCURACY</div>
        </div>
      </div>

      <div class="anim-up" style="background:rgba(255,255,255,0.2);border-radius:16px;padding:14px 28px;margin-top:16px;border:1px solid rgba(255,255,255,0.25);animation-delay:0.3s">
        <div style="font-size:22px;font-weight:900;color:white">${heartsHTML()} ${S.hearts}/5</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:700">HEARTS ${S.hearts===5?'(full! ✓)':'(+3 restored!)'}</div>
      </div>

      <button data-action="nav-practice" class="anim-up" style="margin-top:28px;background:white;color:#d4891e;border:none;border-radius:16px;padding:15px 48px;font-size:16px;font-weight:900;cursor:pointer;animation-delay:0.4s">DONE ✓</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action==='go-home')      { S.screen='home'; render(); }
  else if (action==='nav-home')     { S.screen='home';      render(); }
  else if (action==='nav-practice') { S.screen='practice';  render(); }
  else if (action==='nav-learn')    { S.screen='learn';     render(); }
  else if (action==='nav-stats')    { S.screen='stats';     render(); }
  else if (action==='learn-tab')    { S.learnTab=el.dataset.val; render(); }
  else if (action==='ob-mode') {
    S.mode = el.dataset.val;
    S.onboardStep = 1;
    render();
  }
  else if (action==='ob-goal') {
    S.dailyGoal = parseInt(el.dataset.val);
    render();
  }
  else if (action==='ob-clear-reminder') {
    S.reminderTime = null;
    render();
  }
  else if (action==='ob-back') {
    S.onboardStep = 0;
    render();
  }
  else if (action==='ob-finish') {
    const timeInput = document.getElementById('reminder-input');
    if (timeInput) S.reminderTime = timeInput.value || null;
    S.onboarded = true;
    S.screen = 'home';
    saveProgress();
    render();
  }
  else if (action==='toggle-mode') {
    S.mode = S.mode === 'full' ? 'language-first' : 'full';
    saveProgress();
    render();
  }
  else if (action==='next-ex') { nextEx(); }
  else if (action==='start-practice') { startPractice(); }
  else if (action==='start-lesson') { startLesson(parseInt(el.dataset.id)); }
  else if (action==='check-free')   { handleFree(); }
  else if (action==='speak')  { e.stopPropagation(); speak(el.dataset.text); }
  else if (action==='mc-pick'){ handleMC(el.dataset.opt, el.dataset.ans); }
  else if (action==='match-l'){ handleMatch('L', el.dataset.val); }
  else if (action==='match-r'){ handleMatch('R', el.dataset.val); }
});

// ═══════════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════════
loadProgress();
render();
</script>
